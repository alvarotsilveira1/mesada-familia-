/* === VÍDEO: re-encode em ~480p, max 10s, com áudio se possível === */
async function compressVideo(file, maxSec = 10, maxDim = 480, bitrate = 600000, onProgress){
  const blobUrl = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.src = blobUrl;
  video.muted = false;
  video.playsInline = true;
  video.preload = 'auto';

  await new Promise((res, rej) => {
    video.onloadedmetadata = res;
    video.onerror = () => rej(new Error('Não consegui carregar o vídeo'));
    setTimeout(() => rej(new Error('Timeout ao carregar')), 12000);
  });

  if (video.duration > maxSec + 0.3){
    URL.revokeObjectURL(blobUrl);
    throw new Error(`Vídeo de ${video.duration.toFixed(1)}s. Máximo permitido: ${maxSec}s.`);
  }

  // Detecta MIME suportado
  const types = [
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',  // iOS Safari
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];
  const mime = (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported)
    ? (types.find(t => MediaRecorder.isTypeSupported(t)) || '')
    : '';

  if (!mime){
    // Fallback: arquivo original
    URL.revokeObjectURL(blobUrl);
    if (file.size > 4*1024*1024) throw new Error(`Arquivo de ${(file.size/1024/1024).toFixed(1)}MB é grande. Grave um vídeo mais curto.`);
    return await fileToDataURL(file);
  }

  // Dimensões alvo
  let w = video.videoWidth || 480, h = video.videoHeight || 360;
  if (w > maxDim || h > maxDim){
    if (w > h){ h = Math.round(h * (maxDim / w) / 2) * 2; w = maxDim; }
    else      { w = Math.round(w * (maxDim / h) / 2) * 2; h = maxDim; }
  }

  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  const videoStream = canvas.captureStream(24);
  let combinedStream = videoStream;
  try {
    const elemStream = video.captureStream ? video.captureStream() : (video.mozCaptureStream && video.mozCaptureStream());
    if (elemStream){
      const audio = elemStream.getAudioTracks();
      if (audio.length) combinedStream = new MediaStream([...videoStream.getVideoTracks(), ...audio]);
    }
  } catch(e){ /* sem áudio */ }

  return new Promise((resolve, reject) => {
    let recorder;
    try {
      recorder = new MediaRecorder(combinedStream, {
        mimeType: mime,
        videoBitsPerSecond: bitrate,
        audioBitsPerSecond: 64000
      });
    } catch(err){ return reject(err); }

    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onerror = e => reject(e.error || new Error('Erro de gravação'));
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mime });
      const reader = new FileReader();
      reader.onload = () => { URL.revokeObjectURL(blobUrl); resolve(reader.result); };
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(blob);
    };

    recorder.start();
    video.currentTime = 0;
    video.play().then(() => {
      const drawFrame = () => {
        if (video.ended || video.paused){
          if (recorder.state === 'recording') recorder.stop();
          return;
        }
        ctx.drawImage(video, 0, 0, w, h);
        if (onProgress) onProgress(Math.min(1, video.currentTime / video.duration));
        requestAnimationFrame(drawFrame);
      };
      drawFrame();
      // safety stop
      setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, (maxSec + 1) * 1000);
    }).catch(reject);
  });
}

function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

/* Abre seletor pra vídeo, valida duração, comprime */
function pickVideo(){
  return new Promise(resolve => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'video/*';
    input.style.position = 'fixed';
    input.style.opacity = '0';
    input.style.pointerEvents = 'none';
    document.body.appendChild(input);
    let resolved = false;
    const cleanup = () => { try{ input.remove(); }catch{} };

    input.onchange = async () => {
      const file = input.files?.[0];
      if (!file){ resolved=true; cleanup(); return resolve(null); }
      toast("Processando vídeo… (pode demorar)");
      try {
        const data = await compressVideo(file, 10, 480, 600000);
        const sizeKB = Math.round(data.length * 0.75 / 1024);
        toast(`Vídeo pronto (${sizeKB}KB)`);
        resolved = true; cleanup();
        resolve(data);
      } catch(err){
        console.error(err);
        toast(err.message || "Erro ao processar vídeo", "warn");
        resolved = true; cleanup();
        resolve(null);
      }
    };
    setTimeout(() => {
      window.addEventListener('focus', () => {
        setTimeout(() => { if (!resolved){ cleanup(); resolve(null); } }, 500);
      }, { once:true });
    }, 100);
    input.click();
  });
}

/* ============================================================
   UPDATE CHECKER
   Compara APP_VERSION local com version.json hospedado.
   Se remoto > local, mostra banner "Atualizar agora".
============================================================ */

/* Compara semver tipo "1.4.0" vs "1.4.1" → -1, 0, 1 */
function compareVersions(a, b){
  if (!a) return -1;
  if (!b) return 1;
  const pa = String(a).split('.').map(n => parseInt(n) || 0);
  const pb = String(b).split('.').map(n => parseInt(n) || 0);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++){
    const x = pa[i] || 0, y = pb[i] || 0;
    if (x > y) return 1;
    if (x < y) return -1;
  }
  return 0;
}

/* Checa se há atualização disponível (busca version.json no mesmo diretório do app) */
async function checkForUpdate(){
  // Só faz sentido se hospedado (não funciona com file://)
  if (!location.protocol.startsWith('http')){
    console.log('[update] modo file:// — verificador desabilitado');
    return null;
  }
  // Cache busting forçado
  const url = './version.json?t=' + Date.now();
  try {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return null;
    const info = await resp.json();
    if (!info.version) return null;
    // Compara com versão atual
    const cmp = compareVersions(info.version, APP_VERSION);
    if (cmp > 0){
      console.log(`[update] nova versão: ${APP_VERSION} → ${info.version}`);
      return info;
    } else {
      console.log(`[update] atualizado (${APP_VERSION})`);
      return null;
    }
  } catch(err){
    console.log('[update] não conseguiu verificar:', err.message);
    return null;
  }
}

/* Força recarga ignorando cache */
function forceReload(){
  // Adiciona param na URL pra invalidar cache
  const url = new URL(location.href);
  url.searchParams.set('v', Date.now());
  // Limpa cache do service worker se houver
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    }).catch(() => {});
  }
  if ('caches' in window){
    caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
  }
  location.replace(url.toString());
}

/* Inicia checagem periódica (1 vez ao abrir, depois a cada 6h) */
function startUpdateChecker(){
  const check = async () => {
    const info = await checkForUpdate();
    if (info && info.version !== state.updateInfo?.version){
      state.updateInfo = info;
      // Re-render pra mostrar banner
      if (typeof render === 'function') render();
      // Notificação push se permitida
      notify('🆕 Nova versão disponível', `Versão ${info.version} foi lançada — toque pra atualizar`);
    }
  };
  // Primeira verificação após 3 segundos (deixa o app carregar)
  setTimeout(check, 3000);
  // Depois a cada 6 horas
  setInterval(check, 6 * 60 * 60 * 1000);
}

/* === STORAGE STATS === */
function computeStorageStats(){
  const stats = {
    totalBytes: 0,
    proofPhotos: 0, proofBytes: 0,
    initPhotos: 0,  initBytes: 0,
    bookPhotos: 0,  bookBytes: 0,
    configPhotos: 0, configBytes: 0,
    otherBytes: 0
  };
  const sizeOf = (s) => typeof s === 'string' ? s.length : 0;

  // Config images
  const cfg = Store.data.config || {};
  for (const k of Object.keys(cfg.profileImages || {})){
    const img = cfg.profileImages[k];
    if (img){ stats.configPhotos++; stats.configBytes += sizeOf(img); }
  }
  for (const t of cfg.tasks || []){
    if (t.image){ stats.configPhotos++; stats.configBytes += sizeOf(t.image); }
  }
  for (const taskId of Object.keys(cfg.taskImagesPerKid || {})){
    for (const kidId of Object.keys(cfg.taskImagesPerKid[taskId] || {})){
      const img = cfg.taskImagesPerKid[taskId][kidId];
      if (img){ stats.configPhotos++; stats.configBytes += sizeOf(img); }
    }
  }
  for (const k of Object.keys(cfg.gradeImages || {})){
    const img = cfg.gradeImages[k];
    if (img){ stats.configPhotos++; stats.configBytes += sizeOf(img); }
  }
  for (const k of Object.keys(cfg.penaltyLevels || {})){
    const img = cfg.penaltyLevels[k]?.image;
    if (img){ stats.configPhotos++; stats.configBytes += sizeOf(img); }
  }

  // Months
  for (const ym of Object.keys(Store.data.months || {})){
    for (const p of ['jp','lucas']){
      const m = Store.data.months[ym]?.[p];
      if (!m) continue;

      // Proof photos
      for (const k of Object.keys(m.gradesPhotosA || {})){
        const img = m.gradesPhotosA[k];
        if (img){ stats.proofPhotos++; stats.proofBytes += sizeOf(img); }
      }
      for (const k of Object.keys(m.gradesPhotosB || {})){
        const img = m.gradesPhotosB[k];
        if (img){ stats.proofPhotos++; stats.proofBytes += sizeOf(img); }
      }
      for (const img of m.occurrencePhotos || []){
        if (img){ stats.proofPhotos++; stats.proofBytes += sizeOf(img); }
      }
      for (const tk of Object.keys(m.taskPhotos || {})){
        for (const img of m.taskPhotos[tk] || []){
          if (img){ stats.proofPhotos++; stats.proofBytes += sizeOf(img); }
        }
      }
      for (const k of Object.keys(m.bonusPhotos || {})){
        const img = m.bonusPhotos[k];
        if (img){ stats.proofPhotos++; stats.proofBytes += sizeOf(img); }
      }

      // Initiative media
      for (const init of m.initiatives || []){
        if (init.mediaUrl){ stats.initPhotos++; stats.initBytes += sizeOf(init.mediaUrl); }
      }

      // Book submissions
      const sub = m.bookSubmission;
      if (sub){
        if (sub.cover){ stats.bookPhotos++; stats.bookBytes += sizeOf(sub.cover); }
        for (const s of sub.summaries || []){
          if (s){ stats.bookPhotos++; stats.bookBytes += sizeOf(s); }
        }
      }

      // Penalty images? Não — usam imagens da config
    }
  }

  // Total
  try {
    const json = JSON.stringify(Store.data);
    stats.totalBytes = json.length;
  } catch { stats.totalBytes = 0; }
  // Other = total - all known photo types
  stats.otherBytes = Math.max(0, stats.totalBytes - stats.proofBytes - stats.initBytes - stats.bookBytes - stats.configBytes);
  return stats;
}

/* Pega imagem da nota (0..10): valor é truncado pra inteiro
   Ex: 7,5 → imagem do 7. 9,99 → imagem do 9. 10,00 → imagem do 10. */
/* ============================================================
   SCREEN TIME — bônus por uso consciente do iPhone
============================================================ */

/* Calcula bônus baseado em horas/dia (média semanal) */
/* === SCREEN TIME ===
   Calcula bônus por categoria, depois soma.
   hoursByCategory: { games: 1.5, social: 0.5, videos: 2 }
   Retorna: {
     total,                    // soma de todos os bônus/penalidades
     breakdown: [               // detalhe por categoria
       { id, label, icon, hours, maxHours, diff30min, value, isPenalty }
     ]
   } */
/* Helper: retorna apenas categorias ativas (enabled=true) */
/* === HELPERS HORA:MINUTO ===
   Internamente sempre armazenamos em horas decimais (h)
   Ex: 1h35min = 1 + 35/60 = 1.5833...
*/

/* Converte horas decimais → {h, m} arredondando minutos pra inteiro */
function hoursToHM(decimalHours){
  const num = Number(decimalHours);
  if (isNaN(num) || num < 0) return { h: 0, m: 0 };
  const totalMin = Math.round(num * 60);
  return { h: Math.floor(totalMin / 60), m: totalMin % 60 };
}

/* Converte {h, m} ou (h, m) → horas decimais */
function hmToHours(h, m){
  const hh = Number(h) || 0;
  const mm = Number(m) || 0;
  return hh + (mm / 60);
}

/* Formata horas decimais como "2h35" / "0h45" / "3h" */
function fmtHM(decimalHours){
  if (decimalHours === null || decimalHours === undefined) return '';
  const { h, m } = hoursToHM(decimalHours);
  if (m === 0) return `${h}h`;
  return `${h}h${String(m).padStart(2,'0')}`;
}

/* Formata como "02:35" estilo digital */
function fmtHHMM(decimalHours){
  if (decimalHours === null || decimalHours === undefined) return '00:00';
  const { h, m } = hoursToHM(decimalHours);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* Retorna a lista completa de categorias (saída + entrada + uncat) */
function allFinanceCategories(direction){
  // direction: 'out' | 'in' | 'all'
  const out = Store.data.config.financeOutCategories || [];
  const inn = Store.data.config.financeInCategories || [];
  if (direction === 'out') return out;
  if (direction === 'in') return inn;
  return [...out, ...inn];
}

function findFinanceCategory(catId){
  return allFinanceCategories('all').find(c => c.id === catId) || null;
}

/* Sugere categoria baseada em palavras-chave da descrição.
   direction: 'out' (gastos) ou 'in' (recebimentos) — derivado pelo sinal.
   Retorna catId ou null. */
function suggestFinanceCategory(description, direction){
  if (!description) return null;
  const desc = String(description).toLowerCase();
  const cats = direction === 'in'
    ? Store.data.config.financeInCategories
    : Store.data.config.financeOutCategories;
  for (const cat of (cats || [])){
    for (const kw of (cat.keywords || [])){
      if (desc.includes(kw.toLowerCase())) return cat.id;
    }
  }
  return null;
}

/* Categoriza uma transação (atualiza no statements). 
   IMPORTANTE: usa o campo `financeCategory` separado do `category` antigo */
function setTransactionCategory(person, txId, catId, by){
  const accts = Store.data.statements?.[person] || {};
  for (const key of Object.keys(accts)){
    const txs = accts[key].transactions || [];
    const tx = txs.find(t => t.id === txId);
    if (tx){
      tx.financeCategory = catId || null;
      tx.financeCategorizedBy = by;
      tx.financeCategorizedAt = Date.now();
      Store.save();
      return true;
    }
  }
  return false;
}

/* Calcula totais por categoria financeira pra um mês */
function financeBreakdownByCategory(ym, person){
  const accts = Store.data.statements?.[person] || {};
  const result = {
    out: {},
    in: {},
    uncategorizedOut: { total: 0, count: 0, transactions: [] },
    uncategorizedIn:  { total: 0, count: 0, transactions: [] }
  };
  for (const key of Object.keys(accts)){
    const txs = accts[key].transactions || [];
    for (const tx of txs){
      if (!tx.date || !tx.date.startsWith(ym)) continue;
      // Pula transações internas (transferências entre contas próprias)
      // a menos que tenham categoria manual
      if (tx.internal && !tx.financeCategory) continue;
      const isOut = Number(tx.amount) < 0;
      const direction = isOut ? 'out' : 'in';
      const absValue = Math.abs(Number(tx.amount) || 0);
      const catId = tx.financeCategory;
      if (!catId || !findFinanceCategory(catId)){
        const u = isOut ? result.uncategorizedOut : result.uncategorizedIn;
        u.total += absValue;
        u.count += 1;
        u.transactions.push(tx);
        continue;
      }
      const bucket = result[direction];
      bucket[catId] = bucket[catId] || { total: 0, count: 0, transactions: [] };
      bucket[catId].total += absValue;
      bucket[catId].count += 1;
      bucket[catId].transactions.push(tx);
    }
  }
  return result;
}

/* Verifica regra de poupança (% mínimo).
   Retorna { ok, savedPercent, savedAmount, incomeAmount, required } */
function checkSavingRule(ym, person){
  const cfg = Store.data.config.savingRule || {};
  if (!cfg.enabled) return { ok: true, skipped: true };
  const percent = Number(cfg.percent) || 30;
  const incomeCats = cfg.countableIncomeCats || [];
  const savingCats = cfg.countableSavingCats || [];
  const breakdown = financeBreakdownByCategory(ym, person);
  let income = 0;
  let saved = 0;
  incomeCats.forEach(catId => {
    income += (breakdown.in[catId]?.total || 0);
  });
  savingCats.forEach(catId => {
    saved += (breakdown.out[catId]?.total || 0);
  });
  const required = income * (percent / 100);
  const savedPercent = income > 0 ? (saved / income) * 100 : 0;
  return {
    ok: saved >= required,
    skipped: false,
    income,
    saved,
    savedPercent,
    required,
    requiredPercent: percent
  };
}

function activeScreenTimeCategories(){
  return (Store.data.config.screenTime?.categories || [])
    .filter(c => c.enabled !== false);
}

/* Calcula bônus por categoria.
   - Considera apenas categorias com enabled=true
   - Categorias com type='neutro' aparecem mas não rendem bônus
   - Tiers com maxHoursPerDay (penaliza): pega primeiro com h <= maxHoursPerDay
   - Tiers com minHoursPerDay (premia): pega primeiro com h >= minHoursPerDay
   - Aplica weeklyCap por categoria
*/
function screenTimeBonus(hoursByCategory){
  const cats = activeScreenTimeCategories();
  const input = hoursByCategory || {};
  let total = 0;
  const breakdown = [];
  for (const cat of cats){
    // Só considera categorias que o filho efetivamente preencheu
    // (presença da chave no objeto, mesmo se valor for 0)
    if (!(cat.id in input)) continue;
    const hours = Number(input[cat.id] || 0);
    if (isNaN(hours) || hours < 0){
      breakdown.push({
        id: cat.id, label: cat.label, icon: cat.icon,
        type: cat.type || 'neutro',
        hours: 0, tier: null, bonus: 0, capped: false
      });
      continue;
    }
    let bonus = 0;
    let tier = null;
    let capped = false;
    if (cat.type === 'neutro'){
      bonus = 0;
    } else {
      tier = pickTierForCategory(cat, hours);
      bonus = tier?.bonus || 0;
      const cap = Number(cat.weeklyCap || 0);
      if (cap > 0){
        if (bonus > cap){ bonus = cap; capped = true; }
        else if (bonus < -cap){ bonus = -cap; capped = true; }
      }
    }
    total += bonus;
    breakdown.push({
      id: cat.id, label: cat.label, icon: cat.icon,
      type: cat.type || 'neutro',
      hours, tier, bonus, capped
    });
  }
  return { total, breakdown };
}

/* Escolhe o tier de uma categoria baseado nas horas/dia */
function pickTierForCategory(cat, hours){
  const tiers = cat.tiers || [];
  if (tiers.length === 0) return null;
  // Detecta tipo: maxHoursPerDay (penalidade alta) ou minHoursPerDay (bônus baixo)
  const isMaxBased = tiers[0].maxHoursPerDay !== undefined;
  if (isMaxBased){
    // Ordena por max ascendente; pega o primeiro onde hours <= max
    const sorted = [...tiers].sort((a,b) => (a.maxHoursPerDay||0) - (b.maxHoursPerDay||0));
    for (const t of sorted){
      if (hours <= (t.maxHoursPerDay||0)) return t;
    }
    return sorted[sorted.length - 1] || null;
  } else {
    // minHoursPerDay: ordena por min descendente; pega o primeiro onde hours >= min
    const sorted = [...tiers].sort((a,b) => (b.minHoursPerDay||0) - (a.minHoursPerDay||0));
    for (const t of sorted){
      if (hours >= (t.minHoursPerDay||0)) return t;
    }
    return sorted[sorted.length - 1] || null;
  }
}

/* Soma todos os bônus do mês (só semanas APROVADAS).
   Aplica monthlyMin (geralmente 0) — não afeta o total geral da mesada. */
function screenTimeMonthBonus(ym, person){
  const m = Store.data.months?.[ym]?.[person];
  if (!m || !m.screenTimeWeeks) return 0;
  const approvedSum = m.screenTimeWeeks
    .filter(w => w.status === 'approved')
    .reduce((s, w) => s + (w.bonus || 0), 0);
  const min = Number(Store.data.config.screenTime?.monthlyMin || 0);
  return Math.max(min, approvedSum);
}

/* Conta semanas pendentes de aprovação (pros badges) */
function screenTimeWeeksPending(ym, person){

  if (!m || !m.screenTimeWeeks) return 0;

}

/* Início da semana (segunda) pra um Date */
function weekStartOf(date){
  const d = date instanceof Date ? new Date(date) : new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatWeekRange(weekStart){
  const start = new Date(weekStart + 'T00:00:00');
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  const opts = { day: 'numeric', month: 'short' };
  return `${start.toLocaleDateString('pt-BR', opts)} – ${end.toLocaleDateString('pt-BR', opts)}`;
}

function gradeImageOf(value){
  const num = Number(value);
  if (isNaN(num)) return null;
  const floor = Math.min(10, Math.max(0, Math.floor(num)));
  return Store.data.config.gradeImages?.[floor] || null;
}

/* Pega imagem da tarefa (com fallback hierárquico):
   1. taskImagesPerKid[taskId][person] (específico do filho)
   2. tasks.find().image (genérica da tarefa)

/* Detecta novidades e dispara notificação local */

          notify(`📚 ${USERS[p].name} enviou resumo`, `Análise IA: ${v} (${sub.aiCheck?.score}/100)`);
          if ((sub.submittedAt || 0) > newest) newest = sub.submittedAt;
        }
      }
    }
  } else {
    // Kid: detecta avaliação de iniciativa OU nova penalidade
    for (const ym of Object.keys(Store.data.months || {})){
      const m = Store.data.months[ym]?.[state.user];
      if (!m) continue;
      for (const init of m.initiatives || []){
        if (init.status !== 'pending' && (init.evaluatedAt||0) > last){
          if (init.status === 'approved')
            notify('✅ Iniciativa aprovada!', `+R$${init.award}${init.note?' · '+init.note:''}`);
          else
            notify('Iniciativa avaliada', init.note || 'Sem prêmio desta vez');
          if ((init.evaluatedAt||0) > newest) newest = init.evaluatedAt;
        }
      }
      for (const p of m.penalties || []){
        if ((p.ts || 0) > last && !p.readByKid){
          const lvl = Store.data.config.penaltyLevels?.[p.level];
          notify(`${lvl?.icon || '⚠️'} Abatimento aplicado`, `−R$${p.value} · ${p.desc || lvl?.label || 'sem descrição'}`);
          if ((p.ts || 0) > newest) newest = p.ts;
        }
      }
    }
  }

}

function formatRelTime(ts){
  const d = Date.now() - ts;
  if (d < 60000) return 'agora';
  if (d < 3600000) return `${Math.floor(d/60000)}min atrás`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h atrás`;
  if (d < 7*86400000) return `${Math.floor(d/86400000)}d atrás`;
  const dt = new Date(ts);
  return dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}

/* Frase com base no contexto, valor, % e direção (delta) */
function motivPhrase(context, value, max, raw, delta){
  const pct = max > 0 ? value / max : 0;
  const goingUp   = delta !== undefined && delta > 0.01;
  const goingDown = delta !== undefined && delta < -0.01;

  // === MAIN (mesada do mês por filho) ===
  if (context === 'main'){
    if (raw < 0)        return { em:'💪', tx:'Foi puxado, mas o próximo mês é seu!', kind:'warn' };
    if (value === 0)    return { em:'🎯', tx:'Mês começando, vamos com tudo!', kind:'' };
    if (pct >= 1)       return { em:'🏆', tx:'TETO ATINGIDO! Você arrasou!', kind:'celebrate' };
    if (goingDown && pct < 0.4)
                        return { em:'😬', tx:'Caiu um pouco — bora recuperar!', kind:'down' };
    if (goingUp && pct >= 0.85)
                        return { em:'🔥', tx:'Quase no teto! Não para agora!', kind:'up' };
    if (pct >= 0.85)    return { em:'🔥', tx:'Quase no topo! Falta pouco!' };
    if (pct >= 0.65)    return { em:'🚀', tx:'Mandando muito bem!' };
    if (pct >= 0.40)    return { em:'⭐', tx:'Já passou da metade!' };
    if (pct >= 0.20)    return { em:'✨', tx:'Indo bem, continue assim!' };
    if (pct > 0)        return { em:'🌱', tx:'Começou! Cada Real conta!' };
    return { em:'🎯', tx:'Bora pontuar!' };
  }

  // === CASA (soma da família) ===
  if (context === 'casa'){
    if (value === 0)    return { em:'🏠', tx:'Mês começando para a família' };
    if (pct >= 0.95)    return { em:'👑', tx:'Família ARRASANDO! Dupla no topo!', kind:'celebrate' };
    if (pct >= 0.70)    return { em:'🌟', tx:'Família com performance excelente!' };
    if (pct >= 0.40)    return { em:'❤️', tx:'Crescendo juntos com responsabilidade' };
    if (pct > 0)        return { em:'🌱', tx:'Família dando os primeiros passos do mês' };
    return { em:'🏠', tx:'Pronta pra começar' };
  }

  // === STATS YEAR ===
  if (context === 'stats'){
    const monthsCap = Store.data.config.monthlyCap * 12;
    const yearPct = monthsCap > 0 ? value / monthsCap : 0;
    if (value === 0)    return { em:'🎯', tx:'Ano novo, novas conquistas pela frente' };
    if (yearPct >= 0.80)return { em:'🏅', tx:'ANO INCRÍVEL! Lenda viva!', kind:'celebrate' };
    if (yearPct >= 0.50)return { em:'📈', tx:'Caminho bem construído!' };
    if (yearPct >= 0.20)return { em:'✨', tx:'Bom ritmo, continue subindo' };
    return { em:'🌱', tx:'Cada mês é um degrau' };
  }

  // === BANCO (saldo acumulado) ===
  if (context === 'banco'){
    if (value <= 0)     return { em:'💰', tx:'Vamos começar a guardar juntos?' };
    if (value >= 5000)  return { em:'💎', tx:'PATRIMÔNIO! Você é mestre nisso!', kind:'celebrate' };
    if (value >= 2000)  return { em:'💼', tx:'Boa gestão financeira!' };
    if (value >= 500)   return { em:'🌱', tx:'Saldo crescendo aos poucos' };
    return { em:'💰', tx:'Cada Real guardado conta!' };
  }

  // === SAVINGS RATE (regra dos 30%) ===
  if (context === 'savings'){
    // value = savingsRate (0..1+)
    if (value >= 0.5)   return { em:'🦅', tx:'METADE investida! Você é fora de série!', kind:'celebrate' };
    if (value >= 0.3)   return { em:'🏆', tx:'Bateu os 30%! Bônus garantido!', kind:'celebrate' };
    if (value >= 0.15)  return { em:'📈', tx:'No caminho — invista mais um pouco' };
    if (value > 0)      return { em:'🌱', tx:'Começou a investir! Aumenta o ritmo' };
    return { em:'💰', tx:'Hora de começar a investir!' };
  }

  return { em:'✨', tx:'Continue assim!' };
}

/* Renderiza gauge animado + motiv card */
function renderGauge(context, key, value, max, raw){
  // Track previous value for delta-based motivation
  state.lastValues = state.lastValues || {};
  const stKey = `${context}_${key}`;
  const prev = state.lastValues[stKey];
  const delta = prev !== undefined ? (value - prev) : undefined;

  // Trigger celebration toasts when crossing milestones (only if we had a previous value)
  if (prev !== undefined && max > 0){
    if (prev < max && value >= max){
      setTimeout(() => toast('🏆 TETO ATINGIDO! Excelente!'), 50);
    } else if (prev < max*0.75 && value >= max*0.75){
      setTimeout(() => toast('🚀 75%! Quase no topo!'), 50);
    } else if (prev < max*0.5 && value >= max*0.5){
      setTimeout(() => toast('⭐ Metade feita!'), 50);
    } else if (prev < max*0.25 && value >= max*0.25){
      setTimeout(() => toast('✨ Já é um quarto!'), 50);
    }
  }

  state.lastValues[stKey] = value;

  const phrase = motivPhrase(context, value, max, raw, delta);

  // Determine fill color class based on % AND raw (negative gets red)
  const pct = max > 0 ? Math.min(100, Math.max(0, (value/max)*100)) : 0;
  let fillClass = 'zero';
  if (raw < 0)        fillClass = 'neg';
  else if (pct >= 100) fillClass = 'max';
  else if (pct >= 75)  fillClass = 'high';
  else if (pct >= 50)  fillClass = 'mid';
  else if (pct >= 25)  fillClass = 'midlow';
  else if (pct > 0)    fillClass = 'low';

  return `
    <div class="gauge">
      <div class="gauge-track">
        <div class="gauge-fill ${fillClass}" style="width:${pct}%"></div>
        <div class="gauge-marks">
          <div class="gauge-mark" style="left:25%"></div>
          <div class="gauge-mark" style="left:50%"></div>
          <div class="gauge-mark" style="left:75%"></div>
        </div>
      </div>
      <div class="gauge-labels">
        <span>R$0</span>
        <span>R$${fmtBRLi(max/4)}</span>
        <span>R$${fmtBRLi(max/2)}</span>
        <span>R$${fmtBRLi(max*3/4)}</span>
        <span>R$${fmtBRLi(max)}</span>
      </div>
      <div class="motiv ${phrase.kind || ''}">
        <div class="em">${phrase.em}</div>
        <div class="tx">${phrase.tx}</div>
      </div>
    </div>
  `;
}

/* Versão sem barra: só o card de motivação */

}

   BANK STATEMENT PARSERS
============================================================ */

/* === Helpers de data/valor BR === */
function parseBRDate(s){
  if (!s) return null;
  s = String(s).trim();
  // DD/MM/YYYY ou DD-MM-YYYY ou DD/MM/YY
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m){
    let [,d,mo,y] = m;
    if (y.length === 2) y = '20' + y;
    return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  // YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // OFX YYYYMMDD ou YYYYMMDDHHMMSS
  m = s.match(/^(\d{4})(\d{2})(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
function parseBRAmount(s){
  if (s === null || s === undefined) return NaN;
  if (typeof s === 'number') return s;
  s = String(s).trim();
  if (!s) return NaN;
  // Remove R$, espaços, parênteses (negativo contábil)
  let neg = false;
  if (/^\(.*\)$/.test(s)){ neg = true; s = s.slice(1,-1); }
  if (/^-/.test(s) || /^D\b|^débito|^debito$/i.test(s)) neg = true;
  // Remove em ordem: hífen → R$ → espaços → C/D
  s = s.replace(/^-/,'').replace(/^R\$\s*/i,'').replace(/\s/g,'').replace(/^[CD]\s*/,'');
  // Brasileiro: 1.234,56  →  1234.56
  // Ou Inglês: 1,234.56  →  1234.56
  if (s.includes(',') && s.includes('.')){
    if (s.lastIndexOf(',') > s.lastIndexOf('.')){
      s = s.replace(/\./g,'').replace(',','.');
    } else {
      s = s.replace(/,/g,'');
    }
  } else if (s.includes(',')){
    s = s.replace(/\./g,'').replace(',','.');
  }
  const n = parseFloat(s);
  if (isNaN(n)) return NaN;
  return neg ? -Math.abs(n) : n;
}

/* === Categorização === */
function categorize(desc, amount){
  if (!desc) return amount > 0 ? 'income' : 'other';
  const txt = String(desc).toLowerCase();
  for (const cat of CATEGORIES){
    for (const pat of cat.patterns){
      if (pat.test(txt)) return cat.id;
    }
  }
  // Fallback: positivo sem categoria = entrada
  if (amount > 0) return 'income';
  return 'other';
}

/* === Detecta transferência interna entre próprias contas === */
function isInternalTransfer(desc, person){
  if (!desc) return false;
  const txt = desc.toLowerCase();
  const names = {
    jp: ['joao pedro','joão pedro','j.p.','jp ','j p ','joao','joão'],
    lucas: ['lucas']
  };
  const ownNames = names[person] || [];
  const hasName = ownNames.some(n => txt.includes(n));
  const isTransfer = /pix|ted|transfer|^doc|envio/i.test(desc);
  return hasName && isTransfer;
}

/* === CSV genérico (auto-detecta delimitador) === */
function parseCSV(text){
  // Remove BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // Tenta detectar delimitador
  const firstLines = text.split(/\r?\n/).slice(0,5).join('\n');
  const semis = (firstLines.match(/;/g) || []).length;
  const commas = (firstLines.match(/,/g) || []).length;
  const tabs = (firstLines.match(/\t/g) || []).length;
  const delim = (semis > commas && semis > tabs) ? ';' : (tabs > commas ? '\t' : ',');

  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i=0; i<text.length; i++){
    const c = text[i];
    if (c === '"'){
      if (inQ && text[i+1] === '"'){ cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === delim && !inQ){
      row.push(cur); cur = '';
    } else if ((c === '\n' || c === '\r') && !inQ){
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur); cur = '';
      if (row.some(v => String(v).trim().length > 0)) rows.push(row);
      row = [];
    } else {
      cur += c;
    }
  }
  if (cur || row.length){ row.push(cur); if (row.some(v => String(v).trim().length > 0)) rows.push(row); }
  return rows;
}

/* === Identifica colunas no header === */
function findCols(header){
  const lc = header.map(h => String(h||'').toLowerCase().trim());
  const find = (...keys) => {
    for (const k of keys){
      const i = lc.findIndex(h => h.includes(k));
      if (i >= 0) return i;
    }
    return -1;
  };
  return {
    date:   find('data lan', 'data mov', 'data com', 'data do lan', 'date', 'data'),
    desc:   find('histórico','historico','descrição','descricao','descrição da transação','memo','description','name','beneficiário','beneficiario','title'),
    amount: find('valor','amount','montante','quantia','vlr'),
    debit:  find('débito','debito','saída','saida','withdrawal'),
    credit: find('crédito','credito','entrada','deposit'),
    type:   find('tipo','type','d/c'),
    balance:find('saldo','balance')
  };
}

/* === Transforma rows do CSV em transações === */
function csvToTransactions(rows){
  if (!rows.length) return [];
  // Procura linha que tem colunas conhecidas (header pode não ser a primeira)
  let headerIdx = -1, cols = null;
  for (let i = 0; i < Math.min(15, rows.length); i++){
    const c = findCols(rows[i]);
    if (c.date >= 0 && (c.amount >= 0 || c.debit >= 0 || c.credit >= 0)){
      headerIdx = i; cols = c; break;
    }
  }
  if (headerIdx < 0){
    // Tenta heurística sem header — assumindo primeiras 3 colunas: data, desc, valor
    cols = { date:0, desc:1, amount:2, debit:-1, credit:-1, type:-1, balance:-1 };
    headerIdx = -1;
  }

  const txs = [];
  for (let i = headerIdx + 1; i < rows.length; i++){
    const r = rows[i];
    if (!r || r.every(v => !String(v||'').trim())) continue;
    const dateStr = cols.date >= 0 ? r[cols.date] : null;
    const date = parseBRDate(dateStr);
    if (!date) continue;
    let amount = NaN;
    if (cols.amount >= 0){
      amount = parseBRAmount(r[cols.amount]);
      // Se houver coluna tipo (D/C ou Débito/Crédito), aplica sinal
      if (cols.type >= 0 && !isNaN(amount)){
        const t = String(r[cols.type]||'').toLowerCase();
        if (/d|deb|saida|saída/.test(t)) amount = -Math.abs(amount);
        else if (/c|cred|entrada/.test(t)) amount = Math.abs(amount);
      }
    } else if (cols.debit >= 0 || cols.credit >= 0){
      const d = cols.debit >= 0 ? parseBRAmount(r[cols.debit]) : 0;
      const c = cols.credit >= 0 ? parseBRAmount(r[cols.credit]) : 0;
      const dN = isNaN(d) ? 0 : Math.abs(d);
      const cN = isNaN(c) ? 0 : Math.abs(c);
      amount = cN - dN;
    }
    if (isNaN(amount) || amount === 0) continue;
    const desc = (cols.desc >= 0 ? String(r[cols.desc]||'') : '').trim();
    txs.push({ date, desc, amount });
  }
  return txs;
}

/* === OFX === */
function parseOFX(text){
  const txs = [];
  const blocks = text.match(/<STMTTRN\b[^>]*>([\s\S]*?)<\/STMTTRN>/gi) || [];
  for (const b of blocks){
    const get = tag => {
      const m = b.match(new RegExp('<' + tag + '[^>]*>([^<\\r\\n]+)', 'i'));
      return m ? m[1].trim() : '';
    };
    const date = parseBRDate(get('DTPOSTED'));
    const amount = parseBRAmount(get('TRNAMT'));
    const desc = (get('MEMO') || get('NAME') || get('PAYEE') || '').replace(/\s+/g,' ').trim();
    if (!date || isNaN(amount) || amount === 0) continue;
    txs.push({ date, desc, amount });
  }
  return txs;
}

/* === PDF: carrega PDF.js sob demanda e extrai texto === */
let _pdfjsReady = null;
async function loadPDFjs(){
  if (window.pdfjsLib) return window.pdfjsLib;
  if (_pdfjsReady) return _pdfjsReady;
  _pdfjsReady = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
    s.type = 'module';
    s.onload = () => {
      // PDF.js as ESM expects different import; use UMD instead
      reject(new Error('module load'));
    };
    s.onerror = () => reject(new Error('Falha ao carregar PDF.js'));
    document.head.appendChild(s);
  }).catch(async () => {
    // Fallback UMD
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = () => {
        if (window.pdfjsLib){
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          resolve(window.pdfjsLib);
        } else reject(new Error('PDF.js não carregou'));
      };
      s.onerror = () => reject(new Error('Falha ao carregar PDF.js'));
      document.head.appendChild(s);
    });
  });
  return _pdfjsReady;
}

async function parsePDF(file){
  const lib = await loadPDFjs();
  const buf = await file.arrayBuffer();
  const pdf = await lib.getDocument({ data: new Uint8Array(buf) }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    // Reconstrói linhas baseado em posição Y
    const lines = {};
    for (const it of content.items){
      const y = Math.round(it.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push({ x: it.transform[4], s: it.str });
    }
    const ys = Object.keys(lines).map(Number).sort((a,b)=>b-a);
    for (const y of ys){
      const line = lines[y].sort((a,b)=>a.x-b.x).map(p=>p.s).join(' ').replace(/\s+/g,' ').trim();
      if (line) text += line + '\n';
    }
    text += '\n';
  }
  // Heurística: cada linha que tem data + valor é uma transação
  return parseTextLines(text);
}

function parseTextLines(text){
  const txs = [];
  const lines = text.split(/\r?\n/);
  // regex de data BR (numérica e por extenso)
  const dateNumRe = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/;
  const monthsPT = {
    'janeiro': 1, 'fevereiro': 2, 'março': 3, 'marco': 3, 'abril': 4,
    'maio': 5, 'junho': 6, 'julho': 7, 'agosto': 8, 'setembro': 9,
    'outubro': 10, 'novembro': 11, 'dezembro': 12,
    'jan': 1, 'fev': 2, 'mar': 3, 'abr': 4, 'mai': 5, 'jun': 6,
    'jul': 7, 'ago': 8, 'set': 9, 'out': 10, 'nov': 11, 'dez': 12
  };
  const monthsRegex = Object.keys(monthsPT).join('|');
  // "1 de Abril de 2026" → captura: dia=1, mês=Abril, ano=2026
  const dateExtRe = new RegExp(`(\\d{1,2})\\s+de\\s+(${monthsRegex})\\s+de\\s+(\\d{4})`, 'i');
  const amountRe = /(-?\s*R?\$?\s*[\d.]+,\d{2})/g;

  // Modo "Inter PDF": tem cabeçalho de data por extenso + linhas filhas com transações
  // Detecta este modo: há linha contendo "X de Mês de YYYY" e "Saldo do dia"
  const isInterPDF = lines.some(l => /\d+\s+de\s+\w+\s+de\s+\d{4}.*saldo do dia/i.test(l));

  if (isInterPDF){
    // Modo Inter: cada cabeçalho de data agrupa transações nas linhas seguintes
    let currentDate = null;
    for (let i = 0; i < lines.length; i++){
      const ln = lines[i].trim();
      if (!ln) continue;

      // Verifica se é linha de cabeçalho de data
      const dateMatch = ln.match(dateExtRe);
      if (dateMatch && /saldo do dia/i.test(ln)){
        const day = parseInt(dateMatch[1]);
        const month = monthsPT[dateMatch[2].toLowerCase()];
        const year = parseInt(dateMatch[3]);
        currentDate = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        continue;
      }

      // Linha de transação (tem amount)
      if (currentDate){
        const amounts = ln.match(amountRe);
        if (!amounts || !amounts.length) continue;
        // Pega último valor (que é o valor da transação)
        const amount = parseBRAmount(amounts[amounts.length - 1]);
        if (isNaN(amount) || amount === 0) continue;
        // Descrição: tudo antes do valor
        let desc = ln.replace(/(-?\s*R?\$?\s*[\d.]+,\d{2})/g, '').replace(/\s+/g,' ').trim();
        // Remove sufixos comuns
        desc = desc.replace(/saldo.*$/i, '').trim();
        if (!desc) desc = 'Transação';
        txs.push({ date: currentDate, desc, amount });
      }
    }
    if (txs.length > 0) return txs;
  }

  // Modo genérico (CSV/OFX/PDF de outros bancos): cada linha tem data + valor
  for (const ln of lines){
    let date = null;
    // Tenta data numérica primeiro
    const dM = ln.match(dateNumRe);
    if (dM) date = parseBRDate(dM[1]);
    // Tenta data por extenso
    if (!date){
      const dE = ln.match(dateExtRe);
      if (dE){
        const day = parseInt(dE[1]);
        const month = monthsPT[dE[2].toLowerCase()];
        const year = parseInt(dE[3]);
        date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      }
    }
    if (!date) continue;
    const amounts = ln.match(amountRe);
    if (!amounts || !amounts.length) continue;
    const amount = parseBRAmount(amounts[amounts.length - 1]);
    if (isNaN(amount) || amount === 0) continue;
    let desc = ln
      .replace(dateNumRe, '')
      .replace(dateExtRe, '')
      .replace(/(-?\s*R?\$?\s*[\d.]+,\d{2})/g, '')
      .replace(/\s+/g,' ')
      .trim();
    desc = desc.replace(/saldo.*$/i, '').trim();
    if (!desc) desc = 'Transação';
    txs.push({ date, desc, amount });
  }
  return txs;
}

/* === Hash p/ deduplicação === */
function txHash(tx){
  const cents = Math.round(tx.amount * 100);
  const key = (tx.desc || '').slice(0, 30).toLowerCase().replace(/\s+/g,' ').trim();
  return `${tx.date}_${cents}_${key}`;
}

/* === Análise heurística: parece manuscrito ou digitado/impresso?
   Retorna { score, flags, verdict } onde:
     - score 0..100 (quanto maior, mais parece manuscrito)
     - flags: array de strings com sinais detectados
     - verdict: 'handwritten' | 'suspicious' | 'printed'
   Limites honestos: não detecta IA generativa que produz manuscrito falsificado.
   Detecta bem: screenshots, cópias digitadas, prints de PDF, texto colado.        */
async function analyzeHandwriting(dataUrl){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        // Reduz pra acelerar análise
        const W = 400, H = 400;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        // fit dentro da área mantendo proporção
        const scale = Math.min(W / img.naturalWidth, H / img.naturalHeight);
        const w = img.naturalWidth * scale;
        const h = img.naturalHeight * scale;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, (W-w)/2, (H-h)/2, w, h);

        const data = ctx.getImageData(0, 0, W, H).data;

        // === Análise 1: histograma de cinza ===
        // Manuscrito: gradiente suave de cinza por toda parte (variação na pressão da caneta + papel)
        // Digitado: histograma BIMODAL (preto + branco com pouco meio-termo)
        const hist = new Array(256).fill(0);
        let totalDark = 0;  // pixels < 100 (escuros)
        let totalMid  = 0;  // pixels entre 100 e 200
        let totalLight = 0; // pixels > 200
        for (let i = 0; i < data.length; i += 4){
          const r = data[i], g = data[i+1], b = data[i+2];
          const lum = Math.round(0.299*r + 0.587*g + 0.114*b);
          hist[lum]++;
          if (lum < 100) totalDark++;
          else if (lum < 200) totalMid++;
          else totalLight++;
        }
        const totalPx = data.length / 4;
        const midRatio = totalMid / totalPx;
        const darkRatio = totalDark / totalPx;

        // === Análise 2: linhas de texto por projeção horizontal ===
        // Conta pixels escuros por linha
        const rowDarkness = new Array(H).fill(0);
        for (let y = 0; y < H; y++){
          let count = 0;
          for (let x = 0; x < W; x++){
            const idx = (y * W + x) * 4;
            const lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
            if (lum < 128) count++;
          }
          rowDarkness[y] = count;
        }

        // Detecta linhas de texto (regiões com pixels escuros entre regiões claras)
        const lineThreshold = W * 0.02;  // pelo menos 2% da largura tem que ser escuro
        const lines = [];
        let inLine = false, lineStart = 0;
        for (let y = 0; y < H; y++){
          if (rowDarkness[y] > lineThreshold && !inLine){
            inLine = true; lineStart = y;
          } else if (rowDarkness[y] <= lineThreshold && inLine){
            inLine = false;
            const lineHeight = y - lineStart;
            if (lineHeight > 3 && lineHeight < 60){
              lines.push({ start: lineStart, end: y, height: lineHeight });
            }
          }
        }

        // === Análise 3: variabilidade da altura das linhas ===
        // Manuscrito: alturas variam bastante
        // Digitado: alturas extremamente uniformes
        let heightCV = 0;  // coeficiente de variação
        if (lines.length >= 3){
          const heights = lines.map(l => l.height);
          const mean = heights.reduce((s,v) => s+v, 0) / heights.length;
          const variance = heights.reduce((s,v) => s + (v-mean)**2, 0) / heights.length;
          const stdev = Math.sqrt(variance);
          heightCV = mean > 0 ? stdev / mean : 0;
        }

        // === Análise 4: variabilidade do espaçamento entre linhas ===
        let gapCV = 0;
        if (lines.length >= 3){
          const gaps = [];
          for (let i = 1; i < lines.length; i++){
            gaps.push(lines[i].start - lines[i-1].end);
          }
          const mean = gaps.reduce((s,v) => s+v, 0) / gaps.length;
          const variance = gaps.reduce((s,v) => s + (v-mean)**2, 0) / gaps.length;
          const stdev = Math.sqrt(variance);
          gapCV = mean > 0 ? stdev / mean : 0;
        }

        // === Análise 5: detecta margens perfeitamente alinhadas (típico de página digital) ===
        // Pixels da coluna mais à esquerda com texto: variação de início
        const lineStarts = [];
        for (const ln of lines){
          for (let x = 0; x < W; x++){
            let hit = false;
            for (let y = ln.start; y < ln.end; y++){
              const idx = (y * W + x) * 4;
              const lum = 0.299*data[idx] + 0.587*data[idx+1] + 0.114*data[idx+2];
              if (lum < 128){ hit = true; break; }
            }
            if (hit){ lineStarts.push(x); break; }
          }
        }
        let startCV = 0;
        if (lineStarts.length >= 3){
          const mean = lineStarts.reduce((s,v) => s+v, 0) / lineStarts.length;
          const variance = lineStarts.reduce((s,v) => s + (v-mean)**2, 0) / lineStarts.length;
          const stdev = Math.sqrt(variance);
          startCV = mean > 0 ? stdev / mean : 0;
        }

        // === SCORING ===
        // Sinais de manuscrito:
        //   - midRatio alto (gradientes de cinza)        +30
        //   - heightCV alto (alturas variam)             +25
        //   - gapCV alto (gaps variam)                   +20
        //   - startCV alto (margens irregulares)         +15
        //   - lines >= 3 (existe texto detectável)       +10
        // Total max: 100
        const flags = [];
        let score = 0;

        if (lines.length >= 3) score += 10;
        else flags.push('Poucas linhas de texto detectadas');

        if (midRatio > 0.04){ score += 30; }
        else if (midRatio > 0.02){ score += 15; flags.push('Pouco anti-aliasing — pode ser texto digital'); }
        else { flags.push('Histograma muito binário — típico de texto digital'); }

        if (heightCV > 0.18){ score += 25; }
        else if (heightCV > 0.10){ score += 12; flags.push('Alturas das linhas muito uniformes'); }
        else if (lines.length >= 3){ flags.push('Linhas com altura idêntica — texto digitado?'); }

        if (gapCV > 0.15){ score += 20; }
        else if (gapCV > 0.08){ score += 10; }
        else if (lines.length >= 3){ flags.push('Espaçamento perfeitamente regular'); }

        if (startCV > 0.05){ score += 15; }
        else if (lines.length >= 3){ flags.push('Margem esquerda alinhada perfeitamente'); }

        // Penalidade extra: muito branco (página em branco) ou muito escuro
        if (darkRatio < 0.005){
          flags.push('Quase nenhum texto detectado');
          score = Math.min(score, 30);
        }

        // Verdict
        let verdict;
        if (score >= 65) verdict = 'handwritten';
        else if (score >= 35) verdict = 'suspicious';
        else verdict = 'printed';

        resolve({ score, flags, verdict, stats: { lines: lines.length, midRatio, heightCV, gapCV, startCV, darkRatio } });
      } catch(err){ reject(err); }
    };
    img.onerror = () => reject(new Error('Falha ao analisar imagem'));
    img.src = dataUrl;
  });
}

/* Combina análises de várias páginas do resumo */
async function analyzeBookSummary(coverDataUrl, summaries){
  const results = [];
  for (const s of summaries){
    try {
      const r = await analyzeHandwriting(s);
      results.push(r);
    } catch(e){
      results.push({ score:0, flags:['Erro ao analisar'], verdict:'suspicious' });
    }
  }
  if (!results.length) return null;
  // Score médio + união das flags
  const avgScore = Math.round(results.reduce((s,r) => s + r.score, 0) / results.length);
  const allFlags = [...new Set(results.flatMap(r => r.flags))];
  let verdict;
  if (avgScore >= 65) verdict = 'handwritten';
  else if (avgScore >= 35) verdict = 'suspicious';
  else verdict = 'printed';
  return {
    score: avgScore,
    flags: allFlags,
    verdict,
    pages: results.length,
    perPage: results.map(r => ({ score: r.score, verdict: r.verdict }))
  };
}

/* === Importa um arquivo === */
async function importStatement(person, bank, accountType, file){
  const ext = file.name.toLowerCase().split('.').pop();
  let txs = [];
  if (ext === 'ofx' || ext === 'ofc'){
    const text = await file.text();
    txs = parseOFX(text);
  } else if (ext === 'csv' || ext === 'txt'){
    const text = await file.text();
    txs = csvToTransactions(parseCSV(text));
  } else if (ext === 'pdf'){
    txs = await parsePDF(file);
  } else {
    throw new Error('Formato não suportado. Use CSV, OFX ou PDF.');
  }

  if (!txs.length) throw new Error('Não encontrei transações no arquivo. Verifique o formato.');

  // Categoriza e marca internas + sugere categoria financeira
  for (const t of txs){
    t.category = categorize(t.desc, t.amount);
    t.internal = isInternalTransfer(t.desc, person);
    t.id = txHash(t);
    t.manualCategory = false;
    // Sugestão de categoria financeira (filho confirma depois)
    const direction = Number(t.amount) < 0 ? 'out' : 'in';
    const suggested = suggestFinanceCategory(t.desc, direction);
    t.financeCategory = null;          // null = "Sem categoria"
    t.financeCategorySuggested = suggested;  // sugestão pra UI mostrar
  }

  // Salva, deduplicando
  Store.data.statements = Store.data.statements || {};
  Store.data.statements[person] = Store.data.statements[person] || {};
  const key = `${bank}-${accountType}`;
  const existing = Store.data.statements[person][key] || { bank, type: accountType, transactions: [], lastImport: 0 };
  const seen = new Set(existing.transactions.map(t => t.id));
  let added = 0;
  for (const t of txs){
    if (!seen.has(t.id)){
      existing.transactions.push(t);
      added++;
    }
  }
  existing.transactions.sort((a,b) => b.date.localeCompare(a.date));
  existing.lastImport = Date.now();
  Store.data.statements[person][key] = existing;
  Store.save();
  return { added, total: existing.transactions.length, parsed: txs.length };
}

/* === Stats do mês a partir de transações importadas === */
function computeBankStats(person, ym){
  const accts = Store.data.statements?.[person] || {};
  let income = 0, outgo = 0, invested = 0;
  const byCat = {};
  const allTx = [];
  for (const key of Object.keys(accts)){
    const a = accts[key];
    for (const t of a.transactions || []){
      if (!t.date.startsWith(ym)) continue;
      if (t.internal) { allTx.push({...t, _key:key}); continue; }
      const cat = t.category || 'other';
      const isInvest = (a.type === 'investment') || cat === 'investment' || cat === 'savings';
      if (isInvest && t.amount > 0){
        // Aplicação em conta investimento OU compra de ativo (positiva)
        invested += t.amount;
      } else if (isInvest && t.amount < 0 && a.type === 'movement'){
        // Saída de conta movimento pra investir é entrada na coluna invested
        invested += -t.amount;
      } else if (t.amount > 0){
        income += t.amount;
      } else {
        outgo += -t.amount;
      }
      byCat[cat] = (byCat[cat] || 0) + Math.abs(t.amount);
      allTx.push({ ...t, _key:key });
    }
  }
  const balance = income - outgo - invested;
  const savingsRate = income > 0 ? invested / income : 0;
  const met30Rule = income > 0 && savingsRate >= 0.3;
  return { income, outgo, invested, balance, savingsRate, met30Rule, byCat, allTx };
}

/* === Aplica regra dos 30% no bônus savings === */
function applyAutoSavings(person, ym){
  const m = ensureMonth(ym, person);
  const stats = computeBankStats(person, ym);
  // Apenas auto-marca se ainda não está marcado (não desmarca toggles manuais)
  if (stats.met30Rule && !m.bonus.savings){
    m.bonus.savings = true;
    m._savingsAuto = true;
    Store.save();
    return true;
  }
  return false;
}

/* === GRADES SECTION === */
function renderGradesSec(person, ym, group, subs, m, editable, total){
  const groupLabel = group === 'a' ? 'Disciplinas A' : 'Disciplinas B';
  const groupIcon  = group === 'a' ? '📚' : '📖';
  const groupSub   = group === 'a'
    ? '📈 Esforço hoje, recompensa amanhã · 7→+10 · 8→+20 · 9→+40 · 10→+100'
    : '🌟 Cada nota boa conta · 7→+5 · 8→+10 · 9→+15 · 10→+20';
  const arr     = group === 'a' ? m.gradesA : m.gradesB;
  const photos  = group === 'a' ? m.gradesPhotosA : m.gradesPhotosB;
  const pendVer = group === 'a' ? m.gradesPendingVerificationA : m.gradesPendingVerificationB;
  const isAGroup = group === 'a';

  const totalCls = total > 0 ? 'pos' : total < 0 ? 'neg' : '';
  const totalStr = total > 0 ? `+R$${fmtBRLi(total)}` : total < 0 ? `−R$${fmtBRLi(Math.abs(total))}` : 'R$0';

  return `
  <details class="sec" ${total !== 0 ? 'open' : ''}>
    <summary>
      <span class="sec-icon">${groupIcon}</span>
      <div>
        <div class="sec-title">${groupLabel}</div>
        <div class="sec-sub">${groupSub}</div>
      </div>
      <span class="sec-val ${totalCls}">${totalStr}</span>
    </summary>
    <div class="sec-body">
      ${subs.map((sub, idx) => {
        let rowDelta = 0;
        EVAL_COLS.forEach(col => {
          const g = arr[idx]?.[col];
          if (g !== null && g !== undefined && g !== '' && !isNaN(g)) rowDelta += gradeValue(g, isAGroup);
        });
        const dCls = rowDelta > 0 ? 'pos' : rowDelta < 0 ? 'neg' : 'zero';
        const dStr = rowDelta > 0 ? `+${fmtBRLi(rowDelta)}` : rowDelta < 0 ? `−${fmtBRLi(Math.abs(rowDelta))}` : '0';
        return `
          <div class="grade-row">
            <div class="name">${sub}</div>
            <div class="delta ${dCls}">${dStr}</div>
            <div class="cells">
              ${EVAL_COLS.map(col => {
                const g = arr[idx]?.[col];
                const gv = g === null || g === undefined ? '' : g;
                const cls = gradeClass(g);
                const photoKey = `${idx}_${col}`;
                const hasPhoto = !!photos[photoKey];
                const isPendVer = !!pendVer[photoKey];
                return `<div class="gcell">
                  <div class="gcell-head"><span>${col}</span></div>
                  <div class="gcell-row">
                    <input type="number" inputmode="decimal" step="0.01" min="0" max="10"
                      class="grade-input ${cls}${isPendVer?' pending-ver':''}"
                      value="${gv}"
                      ${editable ? '' : 'disabled'}
                      placeholder="–"
                      onchange="window.__app.setGrade('${person}','${ym}','${group}',${idx},'${col}',this.value)">
                    <button class="pbtn ${hasPhoto?'has':isPendVer?'pending':''}"
                      onclick="window.__app.gradePhoto('${person}','${ym}','${group}',${idx},'${col}')"
                      title="${isPendVer ? 'Aguardando verificação no portal' : 'Foto de comprovação'}">${isPendVer ? '📋' : '📷'}</button>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  </details>
  `;
}

/* === NOTIFICATIONS BANNER (banner de novidades pro filho) === */
function renderClosureBanner(person){
  if (!person || person === 'casa') return '';
  // Só mostra pra dono ou pra admin vendo a tela do filho
  if (state.user !== person && USERS[state.user]?.role !== 'admin') return '';
  const pending = pendingClosures(person);
  if (pending.length === 0){
    // Verifica se mês corrente está fechado (mostra estado)
    const cur = state.ym;
    const m = Store.data.months?.[cur]?.[person];
    if (m?.closure?.status === 'closed'){
      return `
        <div style="background:linear-gradient(135deg, rgba(48,209,88,0.18), rgba(48,209,88,0.06)); border:1px solid rgba(48,209,88,0.40); border-radius:14px; padding:12px; margin:0 0 10px; display:flex; align-items:center; gap:10px">
          <span style="font-size:24px">🔒</span>
          <div style="flex:1; min-width:0">
            <div style="font-weight:700; font-size:13px">${ymLabel(cur)} fechado</div>
            <div class="ghost small" style="font-size:11px">por ${USERS[m.closure.closedBy]?.name || m.closure.closedBy} · ${new Date(m.closure.closedAt).toLocaleDateString('pt-BR')}</div>
          </div>
          <button class="btn" style="padding:6px 12px; font-size:12px" onclick="window.__app.openClosureReport('${person}','${cur}')">📊 Relatório</button>
        </div>
      `;
    }
    return '';
  }
  // Tem fechamento pendente: banner urgente
  const oldestYm = pending[0];
  const isOwner = state.user === person;
  return `
    <div style="background:linear-gradient(135deg, #FFC940, #FFD980); color:#0a0a0b; border:2px solid #c89400; border-radius:14px; padding:14px; margin:0 0 12px; box-shadow: 0 4px 12px rgba(255,201,64,0.4); animation: closurePulse 2s ease-in-out infinite">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px">
        <span style="font-size:30px">⚠️</span>
        <div style="flex:1">
          <div style="font-weight:800; font-size:15px">FECHAMENTO MENSAL PENDENTE</div>
          <div style="font-size:12px; opacity:0.85">${pending.length === 1 ? `Mês de ${ymLabel(oldestYm)}` : `${pending.length} meses pendentes`}</div>
        </div>
      </div>
      ${isOwner ? `
        <button class="btn btn-block" style="background:#0a0a0b; color:#FFC940; font-weight:800; padding:12px; font-size:14px; border:none" onclick="window.__app.openClosureWizard('${person}','${oldestYm}')">
          📋 GERAR FECHAMENTO DE ${ymLabel(oldestYm).toUpperCase()}
        </button>
      ` : `
        <p style="margin:0; font-size:12px; font-weight:600">⏳ ${USERS[person]?.name} ainda não fechou o mês</p>
      `}
    </div>
  `;
}

/* === BOOK BONUS (estruturado: capa + resumo + IA check) === */
function renderBookBonus(person, ym, m, b, on, editable){
  const sub = m.bookSubmission;
  const isAdmin = USERS[state.user].role === 'admin';
  const isOwner = state.user === person;

  // Sem submissão ainda
  if (!sub){
    return `
      <div class="bonus-row">
        <div class="icon">${b.icon}</div>
        <div class="text">
          <div class="name">${b.label}</div>
          <div class="desc">+R$ ${fmtBRLi(b.value)} · capa do livro + fotos do resumo manuscrito</div>
        </div>
        ${editable && isOwner ? `
          <button class="btn btn-primary" style="padding:10px 14px; font-size:12px"
            onclick="window.__app.startBookSubmission('${person}','${ym}')">
            📚 Enviar
          </button>
        ` : `
          <div class="switch" style="opacity:0.4"></div>
        `}
      </div>
    `;
  }

  // Submissão existente: mostra status
  const status = sub.status || 'pending';   // pending | approved | rejected
  const ai = sub.aiCheck;
  const verdictLabel = {
    handwritten: '✓ Parece manuscrito',
    suspicious:  '⚠️ Requer atenção',
    printed:     '🚩 Parece digitado/impresso'
  }[ai?.verdict] || 'Não analisado';
  const statusBadge = {
    pending:  `<span class="badge-status pending">aguardando pais</span>`,
    approved: `<span class="badge-status approved">aprovado · +R$${b.value}</span>`,
    rejected: `<span class="badge-status rejected">rejeitado</span>`
  }[status];

  return `
    <div class="book-card ${status}">
      <div class="book-head">
        <div class="em">${b.icon}</div>
        <div class="ttl">
          <div class="t1">${b.label} ${statusBadge}</div>
          <div class="t2">${formatRelTime(sub.submittedAt || Date.now())} · ${(sub.summaries||[]).length} pág${(sub.summaries||[]).length===1?'':'s'} de resumo</div>
        </div>
      </div>

      <div class="book-grid">
        <div class="book-cover" onclick="window.__app.viewBookMedia('${person}','${ym}','cover')">
          ${sub.cover ? `<img src="${sub.cover}" alt="capa">` : '📚'}
        </div>
        <div class="book-pages">
          ${(sub.summaries || []).map((s, i) => `
            <div class="book-page" onclick="window.__app.viewBookMedia('${person}','${ym}','summary',${i})">
              <img src="${s}" alt="resumo ${i+1}">
              <div class="num">${i+1}</div>
            </div>
          `).join('')}
        </div>
      </div>

      ${ai ? `
        <div class="ai-check">
          <div class="head ${ai.verdict}">
            <span>🔍 Análise IA:</span>
            <span>${verdictLabel}</span>
            <span class="score" style="margin-left:auto">${ai.score}/100</span>
          </div>
          <div class="bar ${ai.verdict}"><div style="width:${ai.score}%"></div></div>
          ${ai.flags && ai.flags.length ? `
            <ul class="flags">
              ${ai.flags.slice(0,4).map(f => `<li>${f}</li>`).join('')}
            </ul>
          ` : `<div class="flags">Nenhum sinal suspeito detectado.</div>`}
          <div class="flags" style="margin-top:6px; font-style:italic">
            ${ai.verdict === 'handwritten' ? 'O resumo passou nas verificações automáticas. Pais podem aprovar com confiança.'
              : ai.verdict === 'suspicious' ? 'Algumas características sugerem texto digital. Vale conferir as fotos.'
              : 'Forte indício de texto digitado/impresso. Recomenda-se rejeitar ou pedir refazer.'}
          </div>
        </div>
      ` : ''}

      ${isAdmin && status === 'pending' ? `
        <div class="book-actions">
          <button class="btn btn-credit grow" onclick="window.__app.approveBook('${person}','${ym}')">✅ Aprovar +R$${b.value}</button>
          <button class="btn btn-debit grow" onclick="window.__app.rejectBook('${person}','${ym}')">❌ Rejeitar</button>
        </div>
      ` : ''}

      ${(isAdmin || isOwner) && status !== 'approved' ? `
        <div class="book-actions">
          <button class="btn ${isAdmin && status === 'pending' ? '' : 'grow'}"
            onclick="window.__app.deleteBookSubmission('${person}','${ym}')"
            style="${isAdmin && status === 'pending' ? 'flex:0 0 auto' : ''}">
            🗑 Apagar e refazer
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

  return `

    <summary>
      <span class="sec-icon">🎁</span>
      <div>
        <div class="sec-title">Bônus do mês</div>
        <div class="sec-sub">⭐ Conquistas extras valem ouro</div>

      ${Object.entries(bonus).map(([k,b]) => {

          </div>
        `;
      }).join('')}

/* Calcula stats do mês corrente: total, count, byType */
/* ============================================================
   FECHAMENTO MENSAL
   - Validações obrigatórias (bloqueiam): tempo de tela 4 sem, extrato Inter, categorização
   - Validações soft (avisam): regra 30%, doação
   - Após fechado: filho não edita, só pai
============================================================ */

/* Retorna mês anterior em formato YYYY-MM */
function previousYM(ym){
  const [y, m] = ym.split('-').map(Number);
  if (m === 1) return `${y-1}-12`;
  return `${y}-${String(m-1).padStart(2,'0')}`;
}

/* Retorna mês corrente baseado na data atual */
function currentYM(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

/* Retorna número de domingos no mês (= número de "semanas a fechar" pra screen time) */
function sundaysInMonth(ym){
  const [y, m] = ym.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  let count = 0;
  for (let d = 1; d <= lastDay; d++){
    if (new Date(y, m-1, d).getDay() === 0) count++;
  }
  return count;
}

/* Verifica se a pessoa tem extrato Inter cobrindo o mês inteiro */
function hasFullInterStatement(person, ym){
  const accts = Store.data.statements?.[person] || {};
  const interMov = accts['inter-movement'];
  if (!interMov || !interMov.transactions?.length) return { ok: false, reason: 'Sem extrato Inter' };
  const txs = interMov.transactions.filter(t => t.date && t.date.startsWith(ym));
  if (txs.length === 0) return { ok: false, reason: 'Sem transações no mês' };
  // Verifica cobertura: deve ter pelo menos 1 transação nos últimos 5 dias do mês
  const [y, mo] = ym.split('-').map(Number);
  const lastDay = new Date(y, mo, 0).getDate();
  const lastFiveStart = `${ym}-${String(lastDay - 4).padStart(2,'0')}`;
  const hasLateMonth = txs.some(t => t.date >= lastFiveStart);
  if (!hasLateMonth){
    return { ok: false, reason: `Extrato parece incompleto (sem transações após dia ${lastDay-4})` };
  }
  return { ok: true, count: txs.length };
}

/* Verifica se todas as transações têm financeCategory */
function allTransactionsCategorized(person, ym){
  const accts = Store.data.statements?.[person] || {};
  let pending = 0;
  let total = 0;
  for (const key of Object.keys(accts)){
    const txs = accts[key].transactions || [];
    for (const tx of txs){
      if (!tx.date || !tx.date.startsWith(ym)) continue;
      if (tx.internal) continue;
      total++;
      if (!tx.financeCategory || !findFinanceCategory(tx.financeCategory)) pending++;
    }
  }
  return { ok: pending === 0, pending, total };
}

/* Verifica se todas as semanas do mês têm registro de tempo de tela aprovado */
function screenTimeAllWeeksApproved(person, ym){
  const m = Store.data.months?.[ym]?.[person];
  const weeks = m?.screenTimeWeeks || [];
  // Conta semanas que começam dentro do mês de referência
  const expectedWeeks = sundaysInMonth(ym);
  const approvedInMonth = weeks.filter(w =>
    w.weekStart && w.weekStart.startsWith(ym) && w.status === 'approved'
  ).length;
  return {
    ok: approvedInMonth >= expectedWeeks,
    expected: expectedWeeks,
    got: approvedInMonth,
    pending: weeks.filter(w => w.weekStart?.startsWith(ym) && w.status === 'pending').length
  };
}

/* Avalia todos os pré-requisitos do fechamento */
function evaluateClosureChecklist(person, ym){
  const checklist = [];
  // 1. Tempo de tela: 4 semanas (ou conforme mês)
  const st = screenTimeAllWeeksApproved(person, ym);
  checklist.push({
    id: 'screenTime',
    label: '📱 Tempo de tela (todas as semanas)',
    required: true,
    ok: st.ok,
    detail: st.ok
      ? `${st.got}/${st.expected} semanas aprovadas`
      : `${st.got}/${st.expected} aprovadas${st.pending > 0 ? ` · ${st.pending} pendente(s) de aprovação` : ''}`
  });
  // 2. Extrato Inter: obrigatório e cobertura completa
  const inter = hasFullInterStatement(person, ym);
  checklist.push({
    id: 'interStatement',
    label: '🏦 Extrato Inter completo',
    required: true,
    ok: inter.ok,
    detail: inter.ok
      ? `${inter.count} transações importadas`
      : inter.reason
  });
  // 3. Todas transações categorizadas (BLOQUEIA)
  const cats = allTransactionsCategorized(person, ym);
  checklist.push({
    id: 'categorization',
    label: '📊 Todas transações categorizadas',
    required: true,
    ok: cats.ok,
    detail: cats.ok
      ? `${cats.total} transações categorizadas`
      : `${cats.pending}/${cats.total} sem categoria`
  });
  // 4. Apontamento de doação (soft — não bloqueia mas pede)
  const m = Store.data.months?.[ym]?.[person] || {};
  const donateInfo = m.closure?.donate;
  checklist.push({
    id: 'donation',
    label: '🤝 Apontou se fez doação',
    required: false,
    ok: !!donateInfo && (donateInfo.did === true || donateInfo.did === false),
    detail: !donateInfo ? 'Não apontado'
            : donateInfo.did ? `✅ Sim: ${donateInfo.place || '(sem detalhes)'}`
            : '⚠️ Não fez nenhuma doação'
  });
  // 5. Regra de poupança (soft — só avisa)
  const sav = checkSavingRule(ym, person);
  checklist.push({
    id: 'savingRule',
    label: `💰 Poupou ≥${sav.requiredPercent || 30}% das entradas`,
    required: false,
    ok: sav.ok || sav.skipped || sav.income === 0,
    detail: sav.skipped ? 'Regra desativada'
            : sav.income === 0 ? 'Sem entradas no mês'
            : sav.ok ? `✅ Poupou ${sav.savedPercent.toFixed(1)}% (R$${fmtBRLi(sav.saved)})`
            : `Poupou ${sav.savedPercent.toFixed(1)}% (faltou R$${fmtBRLi(sav.required - sav.saved)})`
  });
  // Pode fechar?
  const canClose = checklist.filter(c => c.required).every(c => c.ok);
  return { checklist, canClose };
}

/* Snapshot completo do mês: armazena tudo que importa */
function buildClosureSnapshot(person, ym){
  const m = ensureMonth(ym, person);
  const calc = calcMonth(person, ym);
  const fb = financeBreakdownByCategory(ym, person);
  const sav = checkSavingRule(ym, person);
  const biz = bizMonthStats(person, ym);
  return {
    person,
    ym,
    closedAt: Date.now(),
    // Resumo financeiro do app (mesada)
    mesada: {
      total: calc.capped,
      raw: calc.raw,
      gA: calc.gA,
      gB: calc.gB,
      occurrences: calc.occCost,
      tasksTotal: calc.tasksTotal,
      bonusTotal: calc.bonusTotal,
      initiativesTotal: calc.initTotal,
      penaltiesTotal: -calc.penaltyTotal,
      screenTimeTotal: calc.screenTimeTotal || 0
    },
    // Banco
    finance: {
      out: fb.out,
      in: fb.in,
      uncategorizedOut: fb.uncategorizedOut.total,
      uncategorizedIn: fb.uncategorizedIn.total,
      saving: sav
    },
    // Empreendedorismo
    biz,
    // Apontamentos
    donate: m.closure?.donate || null
  };
}

/* Verifica se pode editar o mês: se está fechado, só admins editam */
function canEditMonth(person, ym, byUser){
  const role = USERS[byUser]?.role;
  if (role === 'admin') return true;
  const m = Store.data.months?.[ym]?.[person];
  if (m?.closure?.status === 'closed') return false;
  return true;
}

/* Fecha o mês (admin ou filho com tudo OK) */
function closeMonth(person, ym, by, donateInfo){
  const m = ensureMonth(ym, person);
  const eval_ = evaluateClosureChecklist(person, ym);
  if (!eval_.canClose && USERS[by]?.role !== 'admin'){
    return { ok: false, reason: 'Pendências obrigatórias não atendidas' };
  }
  // Salva apontamento de doação se veio
  if (donateInfo){
    m.closure = m.closure || {};
    m.closure.donate = donateInfo;
  }
  const snapshot = buildClosureSnapshot(person, ym);
  m.closure = {
    ...(m.closure || {}),
    status: 'closed',
    closedAt: Date.now(),
    closedBy: by,
    snapshot,
    forced: !eval_.canClose,
    forcedReason: !eval_.canClose ? 'Admin forçou apesar de pendências' : null
  };
  Store.save();
  return { ok: true, snapshot };
}

/* Reabre mês fechado (só admin) */
function reopenMonth(person, ym, by){
  const m = Store.data.months?.[ym]?.[person];
  if (!m?.closure || m.closure.status !== 'closed') return false;
  if (USERS[by]?.role !== 'admin') return false;
  m.closure.status = 'reopened';
  m.closure.reopenedAt = Date.now();
  m.closure.reopenedBy = by;
  Store.save();
  return true;
}

/* Detecta meses que precisam de fechamento (anteriores ao corrente, sem closure='closed') */
/* Converte valor do Firebase (que pode vir como array ou objeto) em array.
   Firebase Realtime Database às vezes converte arrays esparsos em objetos. */
function safeArray(v){
  if (Array.isArray(v)) return v;
  if (v && typeof v === 'object') return Object.values(v);
  return [];
}

function pendingClosures(person){
  if (!person || person === 'casa') return [];
  const cur = currentYM();
  const monthsKeys = Object.keys(Store.data.months || {});
  const pending = [];
  for (const ym of monthsKeys){
    if (ym >= cur) continue; // só meses passados
    const m = Store.data.months[ym]?.[person];
    if (!m) continue;
    if (m.closure?.status === 'closed') continue;
    // Tem alguma atividade no mês?
    const gradesA = safeArray(m.gradesA);
    const gradesB = safeArray(m.gradesB);
    const initiatives = safeArray(m.initiatives);
    const screenTimeWeeks = safeArray(m.screenTimeWeeks);
    const hasActivity = gradesA.some(g => Object.values(g||{}).some(v => v !== '' && v !== null && v !== undefined))
                     || gradesB.some(g => Object.values(g||{}).some(v => v !== '' && v !== null && v !== undefined))
                     || (m.occurrences || 0) > 0
                     || Object.values(m.tasks || {}).some(v => v > 0)
                     || initiatives.length > 0
                     || screenTimeWeeks.length > 0;
    if (hasActivity) pending.push(ym);
  }
  return pending.sort();
}

function bizMonthStats(person, ym){
  const m = Store.data.months?.[ym]?.[person];
  const entries = m?.bizEntries || [];
  const byType = {};
  let total = 0;
  for (const e of entries){
    byType[e.type] = byType[e.type] || { total: 0, count: 0 };
    byType[e.type].total += Number(e.value) || 0;
    byType[e.type].count += 1;
    total += Number(e.value) || 0;
  }
  return { total, count: entries.length, byType, entries };
}

/* Retorna mensagem motivacional baseada no estado atual */
function bizMotivationFor(person, ym, newEntry){
  if (!newEntry) return null;
  const stats = bizMonthStats(person, ym);
  // First-time por tipo: checa se tem só 1 entrada desse tipo (a recém-adicionada)
  const sameTypeCount = stats.entries.filter(e => e.type === newEntry.type).length;
  if (sameTypeCount === 1){
    const firstMsg = BIZ_MOTIVATIONS.find(m => m.kind === `first_${newEntry.type}`);
    if (firstMsg) return firstMsg.msg;
  }
  // Milestone de valor: compara o total ANTES da entrada
  const totalBefore = stats.total - (Number(newEntry.value) || 0);
  for (const m of BIZ_MOTIVATIONS.filter(m => m.kind === 'milestone').sort((a,b) => b.threshold - a.threshold)){
    if (totalBefore < m.threshold && stats.total >= m.threshold){
      return m.msg;
    }
  }
  // Milestone de contagem
  for (const m of BIZ_MOTIVATIONS.filter(m => m.kind === 'count').sort((a,b) => b.threshold - a.threshold)){
    if ((stats.count - 1) < m.threshold && stats.count >= m.threshold){
      return m.msg;
    }
  }
  return null;
}

  const ym = state.ym || currentYM();
