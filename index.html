        <p class="ghost small">${ymLabel(ym)} · Empreendedorismo dos filhos</p>
      </div>
    </div>

    <div style="background:rgba(255,201,64,0.10); border:1px solid rgba(255,201,64,0.30); border-radius:10px; padding:10px; margin-bottom:14px; font-size:12px">
      ℹ️ <b>Lance aqui suas vendas e serviços!</b> Estes valores não somam no total geral
      (porque já entram via extrato bancário), mas o app calcula um dashboard separado
      e te dá feedback motivacional. Cada lançamento aqui é registro do seu trabalho.
    </div>
  `;

  for (const person of persons){
    const stats = bizMonthStats(person, ym);
    const u = USERS[person];
    html += `
      <div style="background:linear-gradient(135deg, ${u.color}22, transparent); border:1px solid ${u.color}55; border-radius:14px; padding:14px; margin-bottom:14px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
          <span style="font-weight:800; font-size:16px">${u.icon} ${u.name}</span>
          ${(state.user === person || isAdmin) ? `
            <button class="btn btn-primary" style="padding:8px 14px; font-size:13px" onclick="window.__app.openBizAdd('${person}','${ym}')">＋ Lançar</button>
          ` : ''}
        </div>

        ${stats.count > 0 ? `
          <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; margin-bottom:12px">
            <div style="background:var(--card-2); border-radius:10px; padding:10px; text-align:center">
              <div class="ghost small">Total no mês</div>
              <div style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:20px; color:var(--credit)">+R$ ${fmtBRLi(stats.total)}</div>
            </div>
            <div style="background:var(--card-2); border-radius:10px; padding:10px; text-align:center">
              <div class="ghost small">Vendas/Serviços</div>
              <div style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:20px">${stats.count}</div>
            </div>
          </div>

          <div style="display:grid; grid-template-columns: repeat(${BIZ_TYPES.length}, 1fr); gap:6px; margin-bottom:12px">
            ${BIZ_TYPES.map(t => {
              const data = stats.byType[t.id] || { total: 0, count: 0 };
              const pct = stats.total > 0 ? (data.total/stats.total*100) : 0;
              return `
                <div style="background:var(--card-2); border-radius:8px; padding:8px; text-align:center">
                  <div style="font-size:18px">${t.icon}</div>
                  <div class="ghost small" style="font-size:9px; margin-top:2px">${t.label}</div>
                  <div style="font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; margin-top:2px">R$ ${fmtBRLi(data.total)}</div>
                  <div class="ghost small" style="font-size:9px">${data.count} · ${pct.toFixed(0)}%</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="section-title" style="margin:8px 0 6px; font-size:12px">Lançamentos</div>
          ${stats.entries.map(e => {
            const t = BIZ_TYPES.find(x => x.id === e.type) || { icon:'❓', label:e.type };
            const dt = e.date.split('-').reverse().join('/').slice(0,5);
            const canDelete = (e.by === state.user) || isAdmin;
            return `
              <div style="background:var(--card-2); border-radius:10px; padding:10px; margin-bottom:6px; display:flex; align-items:center; gap:10px">
                <div style="font-size:20px">${t.icon}</div>
                <div style="flex:1; min-width:0">
                  <div style="font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${e.description || '(sem descrição)'}</div>
                  <div class="ghost small" style="font-size:11px">${t.label} · ${dt} · ${USERS[e.by]?.name || e.by}</div>
                </div>
                <div style="font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--credit)">+R$ ${fmtBRLi(e.value)}</div>
                ${canDelete ? `<button class="more" onclick="window.__app.removeBiz('${person}','${ym}','${e.id}')" title="Remover">×</button>` : ''}
              </div>
            `;
          }).join('')}
        ` : `
          <div class="empty small" style="margin:0">
            <div class="ico">💼</div>
            ${(state.user === person || isAdmin) ? 'Nenhum lançamento ainda. Toque em <b>Lançar</b> pra começar!' : 'Sem lançamentos ainda.'}
          </div>
        `}
      </div>
    `;
  }

  return html;
}

function renderBanco(){
  const role = USERS[state.user].role;
  const peopleAll = role === 'admin' ? ['jp','lucas'] : [state.user];
  // Estado: qual pessoa está selecionada no dashboard
  if (!peopleAll.includes(state.bancoPerson)) state.bancoPerson = peopleAll[0];
  const person = state.bancoPerson;
  const u = USERS[person];
  const ym = state.ym;
  const banks = BANKS_BY_PERSON[person] || [];
  const stats = computeBankStats(person, ym);
  const cap = Store.data.config.monthlyCap;
  const totalAcum = totalBalance(person);

  // Auto-aplica regra dos 30% (idempotente: só liga, nunca desliga)
  applyAutoSavings(person, ym);

  return `
    <div class="balance-card ${person}">
      <div class="label">${u.emoji} ${u.name} • ${ymLabel(ym)}</div>
      <div class="value"><span class="cur">R$</span>${fmtBRL(totalAcum)}</div>
      <div class="meta"><span>Saldo acumulado da mesada</span></div>
      ${renderMotiv('banco', totalAcum, Store.data.config.monthlyCap*12, totalAcum)}
    </div>

    ${peopleAll.length > 1 ? `
      <div class="bank-tabs">
        ${peopleAll.map(p => `<button class="person-pill ${p===person?'active':''}" onclick="window.__app.setBancoPerson('${p}')">${USERS[p].emoji} ${USERS[p].name}</button>`).join('')}
      </div>` : ''}

    <div class="month-nav">
      <button class="nav-btn" onclick="window.__app.navMonth(-1)">‹</button>
      <div class="name center">${ymLabel(ym).toUpperCase()}<small>extrato bancário do mês</small></div>
      <button class="nav-btn" onclick="window.__app.navMonth(1)">›</button>
    </div>

    <div class="bank-summary">
      <div class="bank-stat in"><div class="lab">Entrou</div><div class="val">+R$ ${fmtBRLi(stats.income)}</div></div>
      <div class="bank-stat out"><div class="lab">Saiu</div><div class="val">−R$ ${fmtBRLi(stats.outgo)}</div></div>
      <div class="bank-stat invest"><div class="lab">Investiu</div><div class="val">R$ ${fmtBRLi(stats.invested)}</div></div>
      <div class="bank-stat balance"><div class="lab">Sobrou</div><div class="val ${stats.balance<0?'neg':''}">R$ ${fmtBRLi(stats.balance)}</div></div>
    </div>

    ${stats.income > 0 ? (() => {
      const savPhrase = motivPhrase('savings', stats.savingsRate);
      return `
      <div class="savings-card ${stats.met30Rule?'met':'miss'}">
        <div class="ttl">${savPhrase.em} ${savPhrase.tx}</div>
        <div class="pct">${(stats.savingsRate*100).toFixed(0)}%</div>
        <div class="sub">
          ${stats.met30Rule
            ? `Investiu R$ ${fmtBRLi(stats.invested)} de R$ ${fmtBRLi(stats.income)} que entraram. Bônus +R$${Store.data.config.bonus.savings.value} liberado!`
            : `Investiu R$ ${fmtBRLi(stats.invested)} de R$ ${fmtBRLi(stats.income)}. Falta investir R$ ${fmtBRLi(Math.max(0, stats.income*0.3 - stats.invested))} pra bater os 30%`}
        </div>
        <div class="savings-bar">
          <div class="fill" style="width:${Math.min(100, stats.savingsRate*100)}%"></div>
          <div class="mark" style="left:30%"></div>
        </div>
      </div>`;
    })() : ''}

    <div class="section-title">Importar extratos</div>
    <p class="ghost small" style="margin:0 0 6px">CSV, OFX ou PDF do seu app/internet banking</p>
    <div class="upload-row">
      ${banks.map(b => {
        const info = BANK_INFO[b];
        const has = !!(Store.data.statements?.[person]?.[`${b}-movement`] || Store.data.statements?.[person]?.[`${b}-investment`]);
        return `
          <button class="upload-btn ${has?'has-data':''}" onclick="window.__app.openImport('${person}','${b}')">
            <div class="icon" style="color:${info.color}">${info.icon}</div>
            <div class="lbl">${info.label}</div>
            <div class="sub">${has?'✓ importado':'CSV / OFX / PDF'}</div>
          </button>
        `;
      }).join('')}
    </div>

    ${(() => {
      const accts = Store.data.statements?.[person] || {};
      const keys = Object.keys(accts);
      if (!keys.length) return `<div class="empty"><div class="ico">📥</div>Importe um extrato pra começar</div>`;
      return `
        <div class="section-title">Contas (${keys.length})</div>
        ${keys.map(k => {
          const a = accts[k];
          const info = BANK_INFO[a.bank] || { label:a.bank, icon:'🏦', color:'#888' };
          const txMonth = (a.transactions||[]).filter(t => t.date.startsWith(ym));
          const sumAmt = txMonth.reduce((s,t) => s + (t.internal?0:t.amount), 0);
          return `
            <div class="acct-row">
              <div class="icon" style="background:${info.color}">${info.icon}</div>
              <div class="body">
                <div class="nm">${info.label} · ${a.type === 'investment' ? 'Investimento' : 'Movimento'}</div>
                <div class="meta">${a.transactions?.length||0} transações totais · ${txMonth.length} no mês</div>
              </div>
              <div class="amt ${sumAmt>0?'pos':sumAmt<0?'neg':''}">${sumAmt>=0?'+':''}R$ ${fmtBRLi(sumAmt)}</div>
              <button class="more" onclick="window.__app.acctMenu('${person}','${k}')" title="Opções">⋯</button>
            </div>
          `;
        }).join('')}
      `;
    })()}

    ${(() => {
      // Novo dashboard de categorias financeiras (lançadas pelo filho/pai)
      const fb = financeBreakdownByCategory(ym, person);
      const outCats = Object.entries(fb.out).filter(([,v]) => v.total > 0).sort((a,b) => b[1].total - a[1].total);
      const inCats = Object.entries(fb.in).filter(([,v]) => v.total > 0).sort((a,b) => b[1].total - a[1].total);
      const hasUncatOut = fb.uncategorizedOut.count > 0;
      const hasUncatIn = fb.uncategorizedIn.count > 0;
      if (!outCats.length && !inCats.length && !hasUncatOut && !hasUncatIn) return '';

      const totalOut = outCats.reduce((s,[,v]) => s + v.total, 0);
      const totalIn = inCats.reduce((s,[,v]) => s + v.total, 0);

      return `
        <div class="section-title">📊 Dashboard por categoria</div>
        ${(hasUncatOut || hasUncatIn) ? `
          <div style="background:rgba(255,201,64,0.15); border:1px solid rgba(255,201,64,0.4); border-radius:10px; padding:10px; margin-bottom:10px; font-size:13px">
            ⚠️ <b>${fb.uncategorizedOut.count + fb.uncategorizedIn.count} transações sem categoria</b> ·
            <span class="ghost small">Toque numa transação no extrato pra categorizar.</span>
          </div>
        ` : ''}

        ${inCats.length ? `
          <div style="background:linear-gradient(135deg, rgba(48,209,88,0.10), transparent); border:1px solid rgba(48,209,88,0.30); border-radius:14px; padding:12px; margin-bottom:10px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
              <span style="font-weight:700; font-size:14px">🟢 Entradas</span>
              <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:16px; color:var(--credit)">+R$ ${fmtBRLi(totalIn)}</span>
            </div>
            <div class="breakdown">
              ${inCats.map(([id, v]) => {
                const cat = findFinanceCategory(id) || { icon:'❓', label:id };
                const pct = totalIn > 0 ? (v.total/totalIn*100) : 0;
                return `
                  <div class="cat-bar-row">
                    <div class="ic">${cat.icon}</div>
                    <div class="nm">${cat.label}</div>
                    <div class="vl">R$ ${fmtBRLi(v.total)}</div>
                    <div class="pc">${pct.toFixed(0)}%</div>
                  </div>
                  <div class="cat-bar-track"><div style="width:${pct}%; background:var(--credit)"></div></div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${outCats.length ? `
          <div style="background:linear-gradient(135deg, rgba(255,69,58,0.10), transparent); border:1px solid rgba(255,69,58,0.30); border-radius:14px; padding:12px; margin-bottom:10px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
              <span style="font-weight:700; font-size:14px">🔴 Saídas</span>
              <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:16px; color:var(--debit)">−R$ ${fmtBRLi(totalOut)}</span>
            </div>
            <div class="breakdown">
              ${outCats.map(([id, v]) => {
                const cat = findFinanceCategory(id) || { icon:'❓', label:id };
                const pct = totalOut > 0 ? (v.total/totalOut*100) : 0;
                return `
                  <div class="cat-bar-row">
                    <div class="ic">${cat.icon}</div>
                    <div class="nm">${cat.label}</div>
                    <div class="vl">R$ ${fmtBRLi(v.total)}</div>
                    <div class="pc">${pct.toFixed(0)}%</div>
                  </div>
                  <div class="cat-bar-track"><div style="width:${pct}%; background:var(--debit)"></div></div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${(() => {
          // Regra de poupança
          const sav = checkSavingRule(ym, person);
          if (sav.skipped || sav.income === 0) return '';
          const okBg = sav.ok ? 'rgba(48,209,88,0.15)' : 'rgba(255,69,58,0.12)';
          const okBorder = sav.ok ? 'rgba(48,209,88,0.40)' : 'rgba(255,69,58,0.35)';
          const okIcon = sav.ok ? '✅' : '⚠️';
          return `
            <div style="background:${okBg}; border:1px solid ${okBorder}; border-radius:14px; padding:12px; margin-bottom:10px">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px">
                <span style="font-weight:700; font-size:13px">${okIcon} Regra de poupança (${sav.requiredPercent}%)</span>
                <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:14px; color:${sav.ok ? 'var(--credit)' : 'var(--debit)'}">${sav.savedPercent.toFixed(1)}%</span>
              </div>
              <div class="ghost small" style="font-size:11px">
                Poupou R$${fmtBRLi(sav.saved)} de R$${fmtBRLi(sav.income)} · Mínimo: R$${fmtBRLi(sav.required)}
              </div>
            </div>
          `;
        })()}
      `;
    })()}

    ${(() => {
      const cats = Object.entries(stats.byCat).filter(([k,v]) => v > 0).sort((a,b) => b[1]-a[1]);
      if (!cats.length) return '';
      const total = cats.reduce((s,[,v]) => s+v, 0);
      return `
        <details style="margin-bottom:10px">
          <summary class="ghost small" style="cursor:pointer; padding:6px 0">📂 Categorização interna automática (legado)</summary>
          <div class="breakdown" style="margin-top:6px">
          ${cats.map(([id, val]) => {
            const c = CAT_MAP[id] || CAT_MAP.other;
            const pct = total > 0 ? (val/total*100) : 0;
            return `
              <div class="cat-bar-row">
                <div class="ic">${c.icon}</div>
                <div class="nm">${c.label}</div>
                <div class="vl">R$ ${fmtBRLi(val)}</div>
                <div class="pc">${pct.toFixed(0)}%</div>
              </div>
              <div class="cat-bar-track"><div style="width:${pct}%; background:${c.color}"></div></div>
            `;
          }).join('')}
          </div>
        </details>
      `;
    })()}

    ${stats.allTx.length > 0 ? renderTxList(person, ym, stats.allTx) : ''}
  `;
}

function renderTxList(person, ym, allTx){
  const filter = state.txFilter || 'all';
  const filtered = filter === 'all' ? allTx
                  : filter === 'in' ? allTx.filter(t => t.amount > 0 && !t.internal)
                  : filter === 'out' ? allTx.filter(t => t.amount < 0 && !t.internal)
                  : allTx.filter(t => t.category === filter);
  const cats = [...new Set(allTx.map(t => t.category))];
  return `
    <div class="section-title">Movimentos (${filtered.length})</div>
    <div class="filter-pills">
      <button class="filter-pill ${filter==='all'?'active':''}" onclick="window.__app.setTxFilter('all')">Todos</button>
      <button class="filter-pill ${filter==='in'?'active':''}" onclick="window.__app.setTxFilter('in')">⬆ Entradas</button>
      <button class="filter-pill ${filter==='out'?'active':''}" onclick="window.__app.setTxFilter('out')">⬇ Saídas</button>
      ${cats.map(c => {
        const cat = CAT_MAP[c] || CAT_MAP.other;
        return `<button class="filter-pill ${filter===c?'active':''}" onclick="window.__app.setTxFilter('${c}')">${cat.icon} ${cat.label}</button>`;
      }).join('')}
    </div>
    <div class="tx-list">
      ${filtered.length === 0 ? `<div class="empty small">Sem transações neste filtro</div>` : filtered.map(t => {
        const cat = CAT_MAP[t.category] || CAT_MAP.other;
        const dt = t.date.split('-').reverse().join('/').slice(0,5);
        // Categoria financeira (nova): mostra badge se tem ou se tem sugestão
        const fcat = t.financeCategory ? findFinanceCategory(t.financeCategory) : null;
        const sugg = !t.financeCategory && t.financeCategorySuggested ? findFinanceCategory(t.financeCategorySuggested) : null;
        const fbadge = fcat
          ? `<span style="background:rgba(48,209,88,0.18); color:var(--credit); padding:1px 6px; border-radius:6px; font-size:10px; margin-left:4px">${fcat.icon} ${fcat.label}</span>`
          : sugg
          ? `<span style="background:rgba(255,201,64,0.20); color:#FFC940; padding:1px 6px; border-radius:6px; font-size:10px; margin-left:4px">💡 ${sugg.icon} ${sugg.label}?</span>`
          : (!t.internal ? `<span style="background:rgba(255,69,58,0.15); color:var(--debit); padding:1px 6px; border-radius:6px; font-size:10px; margin-left:4px">⚠️ sem categ</span>` : '');
        return `
          <div class="tx-row ${t.internal?'internal':''}" onclick="window.__app.editTx('${person}','${t._key}','${t.id}')">
            <div class="ic" style="background:${cat.color}33; color:${cat.color}">${cat.icon}</div>
            <div class="body">
              <div class="nm">${t.desc || '(sem descrição)'} ${fbadge}</div>
              <div class="meta">${dt} · ${cat.label}${t.internal?' · interna':''}</div>
            </div>
            <div class="amt ${t.amount>0?'pos':'neg'}">${t.amount>0?'+':''}R$ ${fmtBRL(Math.abs(t.amount))}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* === PHOTO VIEWER (single photo) ===
   - openPhotoViewer abre o viewer
   - tap em 🗑 Apagar → muda controles pra confirmação inline (NÃO usa confirm() nativo)
   - tap em 🗑 Apagar mesmo → executa onDelete
   - tap em ← Voltar → volta pros controles originais
*/
function openPhotoViewer({ src, title, onReplace, onDelete }){
  state.ctx = { onReplace, onDelete, src, title, confirming: false };
  rePhotoViewer();
}
function rePhotoViewer(){
  const ctx = state.ctx;
  if (!ctx) return;
  const c = ctx.confirming;
  // Não permite fechar tocando fora durante a confirmação (evita perder o estado)
  const dismissAttr = c ? '' : 'onclick="if(event.target===this)window.__app.closeSheet()"';
  const headerHtml = c
    ? `<span class="vt" style="color:#FF8983">⚠️ Apagar foto?</span>
       <span class="vs">esta ação não pode ser desfeita</span>`
    : `<span class="vt">${ctx.title || 'Foto'}</span>
       <span class="vs">toque fora pra fechar</span>`;
  const controlsHtml = c
    ? `
      <button class="ctrl" onclick="window.__app.cancelDeleteConfirm()">← Voltar</button>
      <button class="ctrl danger" onclick="window.__app.executeDelete()"
              style="background:var(--debit); color:#fff; border-color:var(--debit);">🗑 Apagar mesmo</button>
    `
    : `
      ${ctx.onReplace ? `<button class="ctrl primary" onclick="window.__app.photoReplace()">🔄 Trocar</button>` : ''}
      ${ctx.onDelete  ? `<button class="ctrl danger"  onclick="window.__app.startDeleteConfirm()">🗑 Apagar</button>` : ''}
      <button class="ctrl" onclick="window.__app.closeSheet()">✕ Fechar</button>
    `;
  document.getElementById('sheet').innerHTML = `
    <div class="photo-viewer" ${dismissAttr}>
      <div class="vh">${headerHtml}</div>
      <div class="img-wrap"><img src="${ctx.src}" alt=""></div>
      <div class="controls">${controlsHtml}</div>
    </div>`;
}

/* === SYNC INDICATOR === */
let syncTimer;
function showSync(text){
  const el = document.getElementById('sync');
  if (!el) return;
  el.innerHTML = `<span class="led"></span>${text}`;
  el.classList.toggle('live', text === 'live');
  el.classList.add('show');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>el.classList.remove('show'), 1600);
}

/* === TOAST === */
let toastTimer;
/* Mostra imagem motivacional grande quando filho completa tarefa */
function showTaskMotivationalImage(imgSrc, taskDef){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; animation:fadeIn 0.3s; cursor:pointer';
  overlay.innerHTML = `
    <div style="font-size:42px; font-weight:900; color:#30d158; text-shadow:0 0 20px rgba(48,209,88,0.6)">${taskDef.icon} +R$${taskDef.value}</div>
    <img src="${imgSrc}" style="max-width:90vw; max-height:60vh; border-radius:16px; box-shadow:0 4px 30px rgba(0,0,0,0.6)">
    <div style="font-size:18px; font-weight:700; color:#fff">${taskDef.label}</div>
    <div style="font-size:14px; color:#30d158; font-weight:600">✅ Registrado!</div>
    <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:8px">Toque pra fechar</div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 4000);
}

  const num = Number(value);
  const emoji = num === 10 ? '🏆' : num >= 9 ? '🌟' : num >= 8 ? '😄' : num >= 7 ? '👍' : num >= 6 ? '😐' : num >= 4 ? '😟' : '😞';
  const msg = num === 10 ? 'PERFEITO!' : num >= 9 ? 'EXCELENTE!' : num >= 8 ? 'MUITO BEM!' : num >= 7 ? 'BOM TRABALHO!' : num >= 6 ? 'DA PRA MELHORAR' : num >= 4 ? 'PRECISA ESTUDAR' : 'VAMOS RECUPERAR';
  overlay.innerHTML = `
    <div style="font-size:48px; font-weight:900; color:#FFC940; text-shadow:0 0 20px rgba(255,201,64,0.6)">${emoji} ${num}</div>
    <img src="${imgSrc}" style="max-width:90vw; max-height:60vh; border-radius:16px; box-shadow:0 4px 30px rgba(0,0,0,0.6)">
    <div style="font-size:18px; font-weight:700; color:#fff; letter-spacing:1px">${msg}</div>
    <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-top:8px">Toque pra fechar</div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  // Auto-fecha após 4s
  setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 4000);
}

function toast(msg, kind=''){
  const el = document.getElementById('toast');
  if (!el) return;
  el.className = `toast ${kind}`;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2400);
}

          // Reminder: portal escola
          if (currentYM() !== state.ym && kidsPending.length === 0){
            // Início do mês: lembra portal

    if (nm > 12){ nm = 1; ny++; }

  /* === GRADES === */
  async setGrade(person, ym, group, idx, col, val){
    const isAdminAdding = USERS[state.user].role === 'admin';
    const valNum = Number(val);
    const isValidGrade = val !== '' && val !== null && !isNaN(val);
    setGrade(person, ym, group, idx, col, val);
    render();

    // Filho lançando própria nota: pergunta sobre foto + mostra motivação
    if (isValidGrade && isKid() && state.user === person){
      const m = ensureMonth(ym, person);
      const photos = group === 'a' ? m.gradesPhotosA : m.gradesPhotosB;
      const pendVer = group === 'a' ? m.gradesPendingVerificationA : m.gradesPendingVerificationB;
      const key = `${idx}_${col}`;
      // Só pergunta foto se ainda não tem foto E não está marcada como pendente
      if (!photos[key] && !pendVer[key]){
        // Pergunta: tem foto?
        this.askGradePhoto(person, ym, group, idx, col, valNum);
      } else {
        // Já tem foto ou já marcou como pendente → só mostra motivação
        const motivImage = gradeImageOf(valNum);
        if (motivImage) showMotivationalImage(motivImage, valNum);
      }
    }
    // Pai/mãe digitando nota do filho: notifica (igual antes)
    if (isAdminAdding && isValidGrade){
      const subjects = Store.data.config.subjects[person];
      const subjectName = (group === 'a' ? subjects.a : subjects.b)[idx];
      const isA = group === 'a';
      const delta = gradeValue(valNum, isA);
      const emoji = valNum >= 9 ? '🌟' : valNum >= 7 ? '👍' : valNum >= 6 ? '➖' : '⚠️';
      const deltaStr = delta > 0 ? `+R$${delta}` : delta < 0 ? `−R$${Math.abs(delta)}` : 'sem efeito';
      notifyKid(person, {
        kind: 'grade',
        title: `${emoji} ${subjectName}: ${valNum}`,
        body: `${col} · ${deltaStr}`,
        image: gradeImageOf(valNum) || Store.data.config.profileImages?.[person] || null
      });
    }
  },

  askGradePhoto(person, ym, group, idx, col, valNum){
    const subjects = Store.data.config.subjects[person];
    const subjectName = (group === 'a' ? subjects.a : subjects.b)[idx];
    const overlay = document.createElement('div');
    overlay.id = 'photo-prompt-overlay';
    overlay.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9998; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px';
    overlay.innerHTML = `
      <div style="background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; max-width:380px; width:100%; box-shadow:0 8px 30px rgba(0,0,0,0.5)">
        <div style="font-size:32px; text-align:center; margin-bottom:8px">📷</div>

    document.getElementById('grade-have-photo').onclick = async () => {

      // Tira foto
      const data = await pickPhoto();
      if (!data){
        toast("Foto não selecionada — fica pendente", "warn");
        // Marca como pendente verificação se cancelar
        const m = ensureMonth(ym, person);
        const pendVer = group === 'a' ? m.gradesPendingVerificationA : m.gradesPendingVerificationB;

        Store.save();
        render();
        return;
      }
      const m = ensureMonth(ym, person);
      const photos = group === 'a' ? m.gradesPhotosA : m.gradesPhotosB;
      photos[`${idx}_${col}`] = data;
      Store.save();
      render();
      // Mostra motivação
      const motivImage = gradeImageOf(valNum);
      if (motivImage) showMotivationalImage(motivImage, valNum);
      else toast(`✅ Nota lançada com foto`);

    document.getElementById('grade-no-photo').onclick = () => {
      overlay.remove();
      const m = ensureMonth(ym, person);
      const pendVer = group === 'a' ? m.gradesPendingVerificationA : m.gradesPendingVerificationB;
      pendVer[`${idx}_${col}`] = true;
      Store.save();

      const subjects = Store.data.config.subjects[person];

      ['pai','mae'].forEach(parent => {
        notifyKid(parent, {
          kind: 'gradeVerify',

          body: `${subjectName} · ${col}: ${valNum} — verificar no portal`,

        });

      render();
      toast(`📋 Marcado pra os pais verificarem no portal`);
      // Mostra motivação mesmo assim
      const motivImage = gradeImageOf(valNum);
      if (motivImage) setTimeout(() => showMotivationalImage(motivImage, valNum), 800);
    };

    document.getElementById('grade-cancel-photo').onclick = () => {
      overlay.remove();
      // Reverte: apaga a nota
      setGrade(person, ym, group, idx, col, '');
      render();
      toast("Lançamento cancelado");
    };
  },

  async gradePhoto(person, ym, group, idx, col){
    const m = ensureMonth(ym, person);
    const photos = group === 'a' ? m.gradesPhotosA : m.gradesPhotosB;
    const pendVer = group === 'a' ? m.gradesPendingVerificationA : m.gradesPendingVerificationB;
    const key = `${idx}_${col}`;
    const subjectName = (group === 'a' ? Store.data.config.subjects[person].a : Store.data.config.subjects[person].b)[idx];

    // Caso especial: pendente de verificação no portal (filho lançou sem foto)
    if (pendVer[key] && !photos[key]){
      const isAdmin = USERS[state.user]?.role === 'admin';
      const grades = group === 'a' ? m.gradesA : m.gradesB;
      const value = grades[idx]?.[col];
      document.getElementById('sheet').innerHTML = `
        <div class="sheet-bg" onclick="if(event.target===this)window.__app.closeSheet()">
          <div class="sheet">
            <div class="sheet-handle"></div>
            <h2>📋 Verificação no portal</h2>
            <p class="ghost small" style="margin:0 0 14px">${subjectName} · ${col}: <b>${value}</b></p>
            <div style="background:rgba(255,201,64,0.10); border:1px solid rgba(255,201,64,0.30); border-radius:10px; padding:10px; margin-bottom:14px; font-size:12px">
              ⚠️ ${USERS[person]?.name} lançou esta nota sem foto da prova. ${isAdmin ? 'Confirme no portal da escola.' : 'Aguardando seus pais conferirem no portal.'}
            </div>
            <div class="btn-row" style="flex-direction:column; gap:6px">
              ${isAdmin ? `
                <button class="btn btn-primary btn-block" onclick="window.__app.markGradeVerified('${person}','${ym}','${group}',${idx},'${col}')">✅ Verifiquei no portal — confirmar</button>
                <button class="btn btn-block" onclick="window.__app.gradePhotoUpload('${person}','${ym}','${group}',${idx},'${col}')">📷 Adicionar foto agora</button>
              ` : `
                <button class="btn btn-block" onclick="window.__app.gradePhotoUpload('${person}','${ym}','${group}',${idx},'${col}')">📷 Adicionar foto agora</button>
              `}
              <button class="btn btn-block ghost" onclick="window.__app.closeSheet()">Fechar</button>
            </div>
          </div>
        </div>`;
      return;
    }

    if (photos[key]){
      // Tem foto: abre viewer com opções
      openPhotoViewer({
        src: photos[key],
        title: `${subjectName} · ${col}`,
        onReplace: async () => {
          const data = await pickPhoto();
          if (data){
            photos[key] = data;
            Store.save();

            closeSheet();
            render();
          }

        onDelete: () => {
          delete photos[key];
          Store.save();
          toast("Foto apagada");
          closeSheet();
          render();
        }
      });

      // Não tem foto: pede uma
      const data = await pickPhoto();
      if (data){
        photos[key] = data;
        Store.save();
        toast("📷 Foto adicionada");
        render();
      }
    }

      photos[key] = data;

        kind: 'occurrence',
        title: '⚠️ Ocorrência registrada',

      });

  /* === TASKS === */
  async incTask(person, ym, taskId){
    const m = ensureMonth(ym, person);
    const tdef = Store.data.config.tasks.find(t => t.id === taskId);
    const cur = Number(m.tasks?.[taskId] || 0);
    if (cur >= tdef.max){ toast(`Máximo de ${tdef.max} por mês atingido`, 'warn'); return; }
    if (isKid()){
      const data = await pickPhoto();
      if (!data){ toast("Foto obrigatória — tarefa não registrada", "warn"); return; }
      m.tasks[taskId] = cur + 1;
      m.taskPhotos[taskId] = m.taskPhotos[taskId] || [];
      m.taskPhotos[taskId].push(data);
      Store.save();
      // Mostra imagem motivacional (configurada nas Configurações)
      const motivImg = taskImageOf(taskId, person);
      if (motivImg){
        showTaskMotivationalImage(motivImg, tdef);
      } else {
        toast(`✅ ${tdef.label}: +R$${tdef.value}`);
      }
      render();
    } else {
      // Admin (pai/mãe) registrando tarefa do filho
      m.tasks[taskId] = cur + 1;
      Store.save();
      // Notifica o filho com imagem da tarefa (específica do filho > genérica)
      notifyKid(person, {
        kind: 'task',
        title: `${tdef.icon} ${tdef.label}`,
        body: `+R$${tdef.value} registrado por ${USERS[state.user].name}`,
        image: taskImageOf(taskId, person) || Store.data.config.profileImages?.[person] || null
      });
      render();
    }

  decTask(person, ym, taskId){
    const m = ensureMonth(ym, person);
    const cur = Number(m.tasks?.[taskId] || 0);
    if (cur <= 0) return;
    m.tasks[taskId] = cur - 1;
    if ((m.taskPhotos[taskId]||[]).length > m.tasks[taskId]) m.taskPhotos[taskId].pop();
    Store.save();

  async toggleBonus(person, ym, key){
    const m = ensureMonth(ym, person);
    const def = Store.data.config.bonus[key];
    const willTurnOn = !m.bonus[key];

    // Bônus motivacional: sem foto, sem valor — só toggle e mensagem
    if (def?.kind === 'motivational'){
      m.bonus[key] = willTurnOn;
      delete m.bonusPhotos[key];
      Store.save();
      if (willTurnOn) toast(`${def.icon || '❤️'} ${def.phraseOn || 'Muito bem!'}`);
      render();
      return;
    }

    // Bônus estruturado (livro): toggle não funciona direto, força fluxo de submissão
    if (def?.kind === 'structured' && key === 'book'){
      if (m.bookSubmission){
        toast("Já existe submissão. Apague antes de criar nova.", "warn");
      } else {
        this.startBookSubmission(person, ym);
      }
      return;
    }

    if (willTurnOn && isKid()){
      const data = await pickPhoto();
      if (!data){ toast("Foto obrigatória — bônus não ativado", "warn"); return; }
      m.bonus[key] = true;
      m.bonusPhotos[key] = data;
      Store.save();
      toast(`🎁 Bônus ativado com foto`);
      render();
    } else {
      m.bonus[key] = willTurnOn;
      if (!willTurnOn) delete m.bonusPhotos[key];
      Store.save();
      render();
    }
  },

    if (m.bonusPhotos[key]){
      openPhotoViewer({
        src: m.bonusPhotos[key],
        title: `${b.icon} ${b.label}`,

          const data = await pickPhoto();
          if (data){
            m.bonusPhotos[key] = data;
            Store.save(); toast("Foto trocada");
            closeSheet(); render();
          }
        },
        onDelete: () => {

  async submitBook(){
    if (!state.ctx) return;
    const { person, ym, draft } = state.ctx;
    if (!draft.cover || !draft.summaries || draft.summaries.length === 0){
      toast("Adicione capa e pelo menos uma foto do resumo", "warn");
      return;
    }
    toast("🔍 Analisando resumo…");
    let aiCheck = null;
    try {
      aiCheck = await analyzeBookSummary(draft.cover, draft.summaries);
    } catch(err){
      console.error(err);
      aiCheck = { score: 50, flags: ['Erro na análise — revisão manual'], verdict: 'suspicious' };
    }
    const m = ensureMonth(ym, person);
    m.bookSubmission = {
      cover: draft.cover,
      summaries: draft.summaries,
      aiCheck,
      status: 'pending',
      submittedAt: Date.now(),
      reviewedBy: null,
      reviewedAt: null
    };
    Store.save();
    closeSheet();
    const verdictMsg = aiCheck?.verdict === 'handwritten' ? '✓ Parece manuscrito'
                     : aiCheck?.verdict === 'suspicious'  ? '⚠️ Análise indecisa — pais avaliam'
                     : '🚩 Possível texto digitado';
    toast(`📚 Resumo enviado · ${verdictMsg} (${aiCheck?.score || '?'}/100)`);
    notify('📚 Resumo de livro enviado', `${USERS[person].name} enviou um resumo. ${verdictMsg}`);
    render();
  },

    m.bookSubmission.status = 'approved';
    m.bookSubmission.reviewedBy = state.user;
    m.bookSubmission.reviewedAt = Date.now();
    m.bonus.book = true;
    Store.save();
    toast(`✅ Aprovado! +R$${Store.data.config.bonus.book.value}`);

  shareClosureWhatsApp(person, ym){
    const m = ensureMonth(ym, person);
    const snap = m.closure?.snapshot;
    if (!snap){ toast("Sem snapshot disponível", "warn"); return; }
    const u = USERS[person];
    const lines = [];
    lines.push(`Oi pai/mãe! ${u?.icon || ''}`);
    lines.push(`Fechei minha mesada de ${ymLabel(ym)}.`);
    lines.push('');
    lines.push(`💰 *Total a receber: R$ ${fmtBRLi(snap.mesada.total)}*`);
    lines.push('');
    lines.push('📊 Detalhes:');
    if (snap.mesada.gA) lines.push(`• Disciplinas A: R$ ${fmtBRLi(snap.mesada.gA)}`);
    if (snap.mesada.gB) lines.push(`• Disciplinas B: R$ ${fmtBRLi(snap.mesada.gB)}`);
    if (snap.mesada.occurrences) lines.push(`• Ocorrências: R$ ${fmtBRLi(snap.mesada.occurrences)}`);
    if (snap.mesada.tasksTotal) lines.push(`• Tarefas: +R$ ${fmtBRLi(snap.mesada.tasksTotal)}`);
    if (snap.mesada.bonusTotal) lines.push(`• Bônus: +R$ ${fmtBRLi(snap.mesada.bonusTotal)}`);
    if (snap.mesada.initiativesTotal) lines.push(`• Iniciativas: +R$ ${fmtBRLi(snap.mesada.initiativesTotal)}`);
    if (snap.mesada.penaltiesTotal) lines.push(`• Penalidades: R$ ${fmtBRLi(snap.mesada.penaltiesTotal)}`);
    if (snap.mesada.screenTimeTotal) lines.push(`• Tempo de tela: ${snap.mesada.screenTimeTotal>=0?'+':''}R$ ${fmtBRLi(snap.mesada.screenTimeTotal)}`);
    lines.push('');
    if (snap.donate?.did){
      lines.push(`🤝 Fiz doação${snap.donate.place ? `: ${snap.donate.place}` : ''}`);
    }
    if (snap.finance?.saving && !snap.finance.saving.skipped && snap.finance.saving.income > 0){
      const ok = snap.finance.saving.ok ? '✅' : '⚠️';
      lines.push(`${ok} Poupei ${snap.finance.saving.savedPercent.toFixed(1)}% das entradas`);
    }
    lines.push('');
    lines.push('Pode fazer o PIX quando puder! 🙏');
    const msg = encodeURIComponent(lines.join('\n'));
    const url = `https://wa.me/?text=${msg}`;
    try {
      window.open(url, '_blank');
    } catch(e){
      toast("Não foi possível abrir WhatsApp", "warn");
    }
  },

  menu(){ openSheet(sheetMenu()); },
  openConfig(){ openSheet(sheetConfig()); },
  saveConfig(){
    const cfg = Store.data.config;
    document.querySelectorAll('input[data-tbl="A"]').forEach(el => { cfg.gradeA[Number(el.dataset.i)].val = Number(el.value) || 0; });
    document.querySelectorAll('input[data-tbl="B"]').forEach(el => { cfg.gradeB[Number(el.dataset.i)].val = Number(el.value) || 0; });
    cfg.occurrenceCost = Number(document.getElementById('cfg-occ').value) || 0;
    cfg.monthlyCap     = Number(document.getElementById('cfg-cap').value) || 700;
    document.querySelectorAll('input[data-task]').forEach(el => { cfg.tasks[Number(el.dataset.task)].value = Number(el.value) || 0; });
    document.querySelectorAll('input[data-bonus]').forEach(el => { if (cfg.bonus[el.dataset.bonus]) cfg.bonus[el.dataset.bonus].value = Number(el.value) || 0; });
    // Penalidades: valor + descrição
    document.querySelectorAll('input[data-pen-val]').forEach(el => {
      const k = el.dataset.penVal;
      if (cfg.penaltyLevels[k]) cfg.penaltyLevels[k].value = Number(el.value) || 0;
    });
    document.querySelectorAll('input[data-pen-desc]').forEach(el => {
      const k = el.dataset.penDesc;
      if (cfg.penaltyLevels[k]) cfg.penaltyLevels[k].description = el.value.trim();
    });
    document.querySelectorAll('input[data-pin]').forEach(el => {
      const v = el.value.trim();
      if (/^\d{4}$/.test(v)) cfg.pins[el.dataset.pin] = v;
    });
    // Screen Time: weeklyCap por categoria + tiers (faixas em HH MM)
    cfg.screenTime = cfg.screenTime || { enabled: true, categories: [] };
    // Primeiro coleta os pares h/m de cada tier (precisamos juntar em horas decimais)
    const tierHM = {}; // { "catId|tierIdx|field": { h, m } }
    document.querySelectorAll('input[data-st-cat][data-st-tier]').forEach(el => {
      const id = el.dataset.stCat;
      const tierIdx = Number(el.dataset.stTier);
      const field = el.dataset.stField;
      const cat = cfg.screenTime.categories?.find(c => c.id === id);
      if (!cat || !cat.tiers?.[tierIdx]) return;
      const tier = cat.tiers[tierIdx];
      // Detecta se é parte de um par HH MM
      const hmMatch = field.match(/^(maxHoursPerDay|minHoursPerDay)-(h|m)$/);
      if (hmMatch){
        const baseField = hmMatch[1];
        const part = hmMatch[2];
        const key = `${id}|${tierIdx}|${baseField}`;
        tierHM[key] = tierHM[key] || { h: 0, m: 0, baseField, cat, tier };
        const v = parseInt(el.value, 10);
        tierHM[key][part] = isNaN(v) ? 0 : Math.max(0, part === 'm' ? Math.min(59, v) : Math.min(23, v));
      } else if (field === 'bonus'){
        tier.bonus = Number(el.value) || 0;
      }
    });
    // Aplica horas decimais aos tiers
    Object.values(tierHM).forEach(({ h, m, baseField, tier }) => {
      tier[baseField] = hmToHours(h, m);
    });
    // Campos não-tier da categoria (weeklyCap)
    document.querySelectorAll('input[data-st-cat]:not([data-st-tier])').forEach(el => {
      const id = el.dataset.stCat;
      const field = el.dataset.stField;
      const cat = cfg.screenTime.categories?.find(c => c.id === id);
      if (!cat) return;
      if (field === 'weeklyCap'){
        cat.weeklyCap = Math.max(0, Number(el.value) || 0);
      }
    });
    Store.save(); closeSheet(); render();
  },

    const used = stats.totalBytes;
    const usedKB = (used / 1024).toFixed(0);
    const usedMB = (used / 1024 / 1024).toFixed(2);
    // Safari/Chrome típico: 5-10MB por origem. Avisa em 4MB.
    const limit = 5 * 1024 * 1024;
    const pct = Math.min(100, (used / limit) * 100);
    const barColor = pct >= 80 ? 'var(--debit)' : pct >= 60 ? 'var(--primary)' : 'var(--credit)';

    document.getElementById('sheet').innerHTML = `
      <div class="sheet-bg" onclick="if(event.target===this)window.__app.closeSheet()">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h2>📦 Memória do app</h2>

          <div style="background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px">
              <div style="font-weight:700; font-size:14px">Uso atual</div>

            </div>
            <div style="height:10px; background:var(--card-2); border-radius:5px; overflow:hidden;">
              <div style="height:100%; width:${pct}%; background:${barColor}; transition:width .3s;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:4px;">
              <span>${usedKB} KB de ~5 MB</span>
              <span>${pct.toFixed(0)}% usado</span>
            </div>
          </div>

          <div class="section-title" style="margin-top:0">📸 Fotos por tipo</div>

          <div class="cfg-row">
            <div><div class="lbl">Fotos de comprovação (notas/tarefas/ocorrências)</div>
              <div class="desc">${stats.proofPhotos} foto${stats.proofPhotos===1?'':'s'} · ${(stats.proofBytes/1024).toFixed(0)} KB</div>
            </div>
            <button class="btn btn-debit" style="padding:8px 12px; font-size:12px" onclick="window.__app.cleanProofPhotos()">🗑 Limpar</button>
          </div>

          <div class="cfg-row">
            <div><div class="lbl">Fotos de iniciativas (fiz sem pedir)</div>
              <div class="desc">${stats.initPhotos} item${stats.initPhotos===1?'':'s'} · ${(stats.initBytes/1024).toFixed(0)} KB</div>
            </div>
            <button class="btn btn-debit" style="padding:8px 12px; font-size:12px" onclick="window.__app.cleanInitPhotos()">🗑 Limpar</button>
          </div>

          <div class="cfg-row">
            <div><div class="lbl">Fotos de bônus de livro (capa + resumo)</div>
              <div class="desc">${stats.bookPhotos} foto${stats.bookPhotos===1?'':'s'} · ${(stats.bookBytes/1024).toFixed(0)} KB</div>
            </div>
            <button class="btn btn-debit" style="padding:8px 12px; font-size:12px" onclick="window.__app.cleanBookPhotos()">🗑 Limpar</button>
          </div>

          <div class="cfg-row">
            <div><div class="lbl">Configurações (perfis, tarefas, notas, abatimentos)</div>
              <div class="desc">${stats.configPhotos} imagem${stats.configPhotos===1?'':'ns'} · ${(stats.configBytes/1024).toFixed(0)} KB</div>
            </div>
          </div>

          <div class="cfg-row">
            <div><div class="lbl">Outros dados (notas, tarefas, extratos…)</div>
              <div class="desc">${(stats.otherBytes/1024).toFixed(0)} KB</div>
            </div>
          </div>

          <p class="ghost small" style="margin:12px 0; line-height:1.5">
            💡 <b>Dica:</b> apague apenas fotos de meses já fechados. Os dados (notas, tarefas, totais) permanecem intactos quando você limpa as fotos.
          </p>

          <div class="btn-row" style="margin-top:14px">
            <button class="btn grow" onclick="window.__app.closeSheet()">Fechar</button>
            ${used > limit * 0.7 ? `
              <button class="btn btn-debit grow" onclick="window.__app.cleanAllOldPhotos()">⚡ Limpar fotos antigas (>3m)</button>
            ` : ''}
          </div>
        </div>
      </div>`;
  },

  cleanProofPhotos(){
    if (!confirm('Apagar TODAS as fotos de comprovação (notas, tarefas, ocorrências)? Os dados continuam salvos, só as fotos serão removidas.')) return;
    let count = 0;
    for (const ym of Object.keys(Store.data.months || {})){
      for (const p of ['jp','lucas']){
        const m = Store.data.months[ym]?.[p];
        if (!m) continue;
        count += Object.keys(m.gradesPhotosA || {}).length;
        count += Object.keys(m.gradesPhotosB || {}).length;
        count += (m.occurrencePhotos || []).length;
        for (const tk of Object.keys(m.taskPhotos || {})) count += (m.taskPhotos[tk] || []).length;
        m.gradesPhotosA = {};
        m.gradesPhotosB = {};
        m.occurrencePhotos = [];
        m.taskPhotos = {};
        m.bonusPhotos = {};
      }
    }
    Store.save();
    toast(`🗑 ${count} foto${count===1?'':'s'} apagada${count===1?'':'s'}`);
    this.openStorageManager();
  },

  cleanInitPhotos(){
    if (!confirm('Apagar fotos/vídeos de iniciativas? Os pedidos continuam salvos sem mídia.')) return;
    let count = 0;
    for (const ym of Object.keys(Store.data.months || {})){
      for (const p of ['jp','lucas']){
        const m = Store.data.months[ym]?.[p];
        if (!m) continue;
        for (const init of m.initiatives || []){
          if (init.mediaUrl){ count++; init.mediaUrl = null; init.mediaType = null; }
        }
      }
    }
    Store.save();
    toast(`🗑 ${count} mídia${count===1?'':'s'} apagada${count===1?'':'s'}`);
    this.openStorageManager();
  },

  cleanBookPhotos(){
    if (!confirm('Apagar fotos de capas e resumos de livros já avaliados (aprovados ou rejeitados)? Submissões pendentes ficam intactas.')) return;
    let count = 0;
    for (const ym of Object.keys(Store.data.months || {})){
      for (const p of ['jp','lucas']){
        const m = Store.data.months[ym]?.[p];
        const sub = m?.bookSubmission;
        if (!sub) continue;
        if (sub.status === 'pending') continue; // preserva pendentes
        if (sub.cover){ count++; }
        count += (sub.summaries || []).length;
        sub.cover = null;
        sub.summaries = [];
      }
    }
    Store.save();
    toast(`🗑 ${count} foto${count===1?'':'s'} de livro apagada${count===1?'':'s'}`);
    this.openStorageManager();
  },

  cleanAllOldPhotos(){
    if (!confirm('Apagar TODAS as fotos de meses anteriores a 3 meses atrás? Os dados (notas, tarefas, totais) continuam intactos.')) return;
    const now = new Date();
    const cutoff = new Date(now.getFullYear(), now.getMonth() - 3, 1);
    const cutoffYM = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}`;
    let count = 0;
    for (const ym of Object.keys(Store.data.months || {})){
      if (ym >= cutoffYM) continue;
      for (const p of ['jp','lucas']){
        const m = Store.data.months[ym]?.[p];
        if (!m) continue;
        count += Object.keys(m.gradesPhotosA || {}).length;
        count += Object.keys(m.gradesPhotosB || {}).length;
        count += (m.occurrencePhotos || []).length;
        for (const tk of Object.keys(m.taskPhotos || {})) count += (m.taskPhotos[tk] || []).length;
        m.gradesPhotosA = {};
        m.gradesPhotosB = {};
        m.occurrencePhotos = [];
        m.taskPhotos = {};
        m.bonusPhotos = {};
        // Também limpa mídia de iniciativas antigas
        for (const init of m.initiatives || []){
          if (init.mediaUrl){ count++; init.mediaUrl = null; init.mediaType = null; }
        }
        // E livro já avaliado
        if (m.bookSubmission && m.bookSubmission.status !== 'pending'){
          if (m.bookSubmission.cover) count++;
          count += (m.bookSubmission.summaries || []).length;
          m.bookSubmission.cover = null;
          m.bookSubmission.summaries = [];
        }
      }
    }
    Store.save();
    toast(`✅ ${count} foto${count===1?'':'s'} antiga${count===1?'':'s'} apagada${count===1?'':'s'}`);
    this.openStorageManager();
  },

  /* Handler chamado quando filho/pai digita H ou M; valida e atualiza preview.
     Agora aceita TOTAL DA SEMANA (até 168h = 7×24). */
  onScreenTimeHM(catId, field, el){
    let v = parseInt(el.value, 10);
    if (isNaN(v)) v = 0;
    if (field === 'm' && v > 59){
      el.value = 59;
    } else if (field === 'h' && v > 168){
      el.value = 168;
    } else if (v < 0){
      el.value = 0;
    }
    this.previewScreenTimeBonus();
  },

  previewScreenTimeBonus(){
    const cats = activeScreenTimeCategories();
    const weeklyTotals = {};   // total da semana por categoria (em horas)
    const dailyAvg = {};       // média diária (total ÷ 7)
    cats.forEach(c => {
      const h = parseInt(document.getElementById(`st-cat-${c.id}-h`)?.value, 10);
      const m = parseInt(document.getElementById(`st-cat-${c.id}-m`)?.value, 10);
      const hh = isNaN(h) ? 0 : h;
      const mm = isNaN(m) ? 0 : m;
      const totalSemana = hmToHours(hh, mm);
      const media = totalSemana / 7;
      // Atualiza badge "≈ Xh/dia" ao lado do campo
      const avgEl = document.getElementById(`st-avg-${c.id}`);
      if (avgEl){
        avgEl.textContent = totalSemana > 0 ? `≈ ${fmtHM(media)}/dia` : '';
      }
      if (totalSemana > 0){
        weeklyTotals[c.id] = totalSemana;
        dailyAvg[c.id] = media;
      }
    });
    const preview = document.getElementById('st-preview');
    if (!preview) return;
    if (Object.keys(dailyAvg).length === 0){
      preview.innerHTML = `<div class="ghost small center">Digite o total da semana para ver o cálculo</div>`;
      return;
    }
    // Cálculo do bônus usa MÉDIA DIÁRIA (faixas continuam por-dia)
    const result = screenTimeBonus(dailyAvg);
    const totalCol = result.total > 0 ? 'var(--credit)' : result.total < 0 ? 'var(--debit)' : 'var(--muted)';
    preview.innerHTML = `
      ${result.breakdown.map(b => {
        const tierLabel = b.tier ? `${b.tier.emoji||''} ${b.tier.label}` : 'sem cálculo';
        const totalSem = weeklyTotals[b.id] || 0;
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:12px">
          <span>${b.icon} <b>${b.label}</b> · ${fmtHM(totalSem)}/sem <span class="ghost small">≈ ${fmtHM(b.hours)}/dia · ${tierLabel}${b.capped?' · ⛔ teto':''}</span></span>
          <span style="font-family:'JetBrains Mono',monospace; font-weight:700; color:${b.bonus > 0 ? 'var(--credit)' : b.bonus < 0 ? 'var(--debit)' : 'var(--muted)'}">${b.bonus > 0 ? '+' : ''}R$${b.bonus}</span>
        </div>
      `;}).join('')}
      <div style="border-top:1px solid var(--line); margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center">
        <span style="font-weight:700">Total da semana</span>
        <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; color:${totalCol}">${result.total > 0 ? '+' : ''}R$${result.total}</span>
      </div>
    `;
  },

  saveScreenTimeWeek(person, ym){
    const dateInput = document.getElementById('st-week')?.value;
    const screenshot = state.ctx?.screenTimeScreenshot;
    if (!screenshot){
      toast("📸 Envie o print primeiro", "warn");
      return;
    }
    if (!dateInput){
      toast("Escolha uma data", "warn");
      return;
    }
    const cats = activeScreenTimeCategories();
    const hours = {};
    let anyValid = false;
    for (const cat of cats){
      const hEl = document.getElementById(`st-cat-${cat.id}-h`);
      const mEl = document.getElementById(`st-cat-${cat.id}-m`);
      const h = parseInt(hEl?.value, 10);
      const m = parseInt(mEl?.value, 10);
      const hh = isNaN(h) ? 0 : h;
      const mm = isNaN(m) ? 0 : m;
      if (mm > 59){
        toast(`${cat.label}: minutos máx 59`, "warn");
        return;
      }
      if (hh > 168 || hh < 0 || mm < 0 || (hh === 168 && mm > 0)){
        toast(`${cat.label}: tempo inválido (máx 168h/sem)`, "warn");
        return;
      }
      const decimal = hmToHours(hh, mm);  // total da semana
      if (decimal > 0){
        hours[cat.id] = decimal;
        anyValid = true;
      }
    }
    if (!anyValid){
      toast("Preencha pelo menos uma categoria", "warn");
      return;
    }
    const ws = weekStartOf(dateInput);
    const entry = addScreenTimeWeek(person, ym, ws, hours, state.user, screenshot);

    // Notifica:
    // - Se filho lançou → notifica os pais (status pendente)
    // - Se pai/mãe lançaram → notifica o filho (já aprovado)
    const isAdmin = USERS[state.user]?.role === 'admin';
    if (isAdmin){
      // Pai/mãe lançou → aprova direto, notifica o filho
      notifyKid(person, {
        kind: 'screenTime',
        title: `📱 Tempo de tela registrado`,
        body: entry.bonus >= 0 ? `+R$${entry.bonus} esta semana` : `−R$${Math.abs(entry.bonus)} esta semana`,
        image: screenshot
      });
      toast(`✅ Semana salva · ${entry.bonus >= 0 ? '+' : '−'}R$${Math.abs(entry.bonus)}`);
    } else {
      // Filho lançou → fica pendente, notifica ambos os pais
      const summary = entry.breakdown.map(b => `${b.icon} ${fmtHM(b.hours)}/sem`).join(' · ');
      ['pai', 'mae'].forEach(parent => {
        notifyKid(parent, {
          kind: 'screenTimePending',
          title: `📱 ${USERS[person]?.name || person} enviou tempo de tela`,
          body: `${summary} · aguardando sua aprovação`,
          image: screenshot,
          by: state.user
        });
      });
      toast(`✅ Enviado · aguardando aprovação dos pais`);
    }

    state.ctx.screenTimeScreenshot = null;
    closeSheet();
  },

  removeScreenTimeWeek(person, ym, weekStart){
    if (!confirm(`Remover lançamento da semana de ${formatWeekRange(weekStart)}?`)) return;
    removeScreenTimeWeek(person, ym, weekStart);
    toast("🗑 Lançamento removido");
    render();
  },

  approveScreenTimeWeek(person, ym, weekStart){
    const w = reviewScreenTimeWeek(person, ym, weekStart, 'approved', null, state.user);
    if (!w) return;
    notifyKid(person, {
      kind: 'screenTime',
      title: `✅ Tempo de tela aprovado`,
      body: `${formatWeekRange(weekStart)}: ${w.bonus >= 0 ? '+' : '−'}R$${Math.abs(w.bonus)}`,
      image: w.screenshot
    });
    toast(`✅ Aprovado · ${w.bonus >= 0 ? '+' : '−'}R$${Math.abs(w.bonus)}`);
    render();
  },

  rejectScreenTimeWeek(person, ym, weekStart){
    if (!confirm(`Rejeitar este envio? O filho será notificado e poderá enviar de novo.`)) return;
    const w = reviewScreenTimeWeek(person, ym, weekStart, 'rejected', null, state.user);
    if (!w) return;
    notifyKid(person, {
      kind: 'screenTime',
      title: `❌ Tempo de tela rejeitado`,
      body: `${formatWeekRange(weekStart)} · refaça com print correto`,
      image: w.screenshot
    });
    toast("❌ Rejeitado");
    render();
  },

  openScreenTimeReview(person, ym, weekStart){
    const m = Store.data.months?.[ym]?.[person];
    const w = m?.screenTimeWeeks?.find(x => x.weekStart === weekStart);
    if (!w) return;
    const cats = activeScreenTimeCategories();
    state.ctx = state.ctx || {};
    state.ctx.reviewWeek = { person, ym, weekStart };

    document.getElementById('sheet').innerHTML = `
      <div class="sheet-bg" onclick="if(event.target===this)window.__app.closeSheet()">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h2>✏️ Ajustar antes de aprovar</h2>
          <p class="ghost small" style="margin:0 0 14px">
            ${USERS[person]?.name || person} · ${formatWeekRange(weekStart)}<br>
            Verifique o print e ajuste os valores se necessário.
          </p>

          ${w.screenshot ? `
            <div style="margin-bottom:14px">
              <img src="${w.screenshot}" style="width:100%; max-height:300px; object-fit:contain; border-radius:10px; background:var(--card-2)">
            </div>
          ` : ''}

          <div class="section-title" style="margin:0 0 8px">Valores enviados pelo filho</div>

          ${cats.map(cat => {
            const v = w.hoursByCategory?.[cat.id] || 0;
            const { h, m } = hoursToHM(v);
            return `
            <div style="background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:8px">
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px">
                <div style="font-size:24px">${cat.icon}</div>
                <div style="flex:1">
                  <div style="font-weight:700; font-size:13px">${cat.label}</div>
                  <div class="ghost small" style="font-size:11px">Filho enviou: ${fmtHM(v)}/sem ≈ ${fmtHM(v/7)}/dia</div>
                </div>
              </div>
              <div style="display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap">
                <span class="ghost small">total da semana:</span>
                <div class="hm-input">
                  <input type="number" min="0" max="168" inputmode="numeric" pattern="[0-9]*"
                    id="rev-cat-${cat.id}-h" value="${h}"
                    oninput="window.__app.onReviewHM('${cat.id}','h',this)">
                  <span class="sep">h</span>
                  <input type="number" min="0" max="59" inputmode="numeric" pattern="[0-9]*"
                    id="rev-cat-${cat.id}-m" value="${m}"
                    oninput="window.__app.onReviewHM('${cat.id}','m',this)">
                  <span class="sep">min</span>
                </div>
                <span class="ghost small" id="rev-avg-${cat.id}" style="font-size:11px; min-width:80px"></span>
              </div>
            </div>
          `;}).join('')}

          <div id="rev-preview" style="background:linear-gradient(135deg, rgba(255,201,64,0.10), transparent); border:1px solid var(--line); border-radius:12px; padding:14px; margin:10px 0; min-height:80px">
            <div class="ghost small center">Previsão do bônus aparecerá aqui</div>
          </div>

          <div class="btn-row">
            <button class="btn grow" onclick="window.__app.closeSheet()">Cancelar</button>
            <button class="btn btn-primary grow" onclick="window.__app.confirmReviewApprove()">✅ Aprovar com ajuste</button>
          </div>
        </div>
      </div>`;
    setTimeout(() => window.__app.previewReviewBonus(), 100);
  },

  onReviewHM(catId, field, el){
    let v = parseInt(el.value, 10);
    if (isNaN(v)) v = 0;
    if (field === 'm' && v > 59) el.value = 59;
    else if (field === 'h' && v > 168) el.value = 168;
    else if (v < 0) el.value = 0;
    this.previewReviewBonus();
  },

  previewReviewBonus(){
    const cats = activeScreenTimeCategories();
    const weeklyTotals = {};
    const dailyAvg = {};
    cats.forEach(c => {
      const h = parseInt(document.getElementById(`rev-cat-${c.id}-h`)?.value, 10);
      const m = parseInt(document.getElementById(`rev-cat-${c.id}-m`)?.value, 10);
      const totalSemana = hmToHours(isNaN(h)?0:h, isNaN(m)?0:m);
      const media = totalSemana / 7;
      const avgEl = document.getElementById(`rev-avg-${c.id}`);
      if (avgEl){
        avgEl.textContent = totalSemana > 0 ? `≈ ${fmtHM(media)}/dia` : '';
      }
      if (totalSemana >= 0){
        weeklyTotals[c.id] = totalSemana;
        dailyAvg[c.id] = media;
      }
    });
    const result = screenTimeBonus(dailyAvg);
    const totalCol = result.total > 0 ? 'var(--credit)' : result.total < 0 ? 'var(--debit)' : 'var(--muted)';
    const preview = document.getElementById('rev-preview');
    if (!preview) return;
    preview.innerHTML = `
      ${result.breakdown.map(b => {
        const tierLabel = b.tier ? `${b.tier.emoji||''} ${b.tier.label}` : 'sem cálculo';
        const totalSem = weeklyTotals[b.id] || 0;
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:12px">
          <span>${b.icon} <b>${b.label}</b> · ${fmtHM(totalSem)}/sem <span class="ghost small">≈ ${fmtHM(b.hours)}/dia · ${tierLabel}${b.capped?' · ⛔':''}</span></span>
          <span style="font-family:'JetBrains Mono',monospace; font-weight:700; color:${b.bonus > 0 ? 'var(--credit)' : b.bonus < 0 ? 'var(--debit)' : 'var(--muted)'}">${b.bonus > 0 ? '+' : ''}R$${b.bonus}</span>
        </div>
      `;}).join('')}
      <div style="border-top:1px solid var(--line); margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center">
        <span style="font-weight:700">Total</span>
        <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; color:${totalCol}">${result.total > 0 ? '+' : ''}R$${result.total}</span>
      </div>
    `;
  },

  confirmReviewApprove(){
    const ctx = state.ctx?.reviewWeek;
    if (!ctx){ toast("Erro de contexto", "warn"); return; }
    const cats = activeScreenTimeCategories();
    const adjusted = {};  // total da semana
    for (const cat of cats){
      const h = parseInt(document.getElementById(`rev-cat-${cat.id}-h`)?.value, 10);
      const m = parseInt(document.getElementById(`rev-cat-${cat.id}-m`)?.value, 10);
      const hh = isNaN(h) ? 0 : h;
      const mm = isNaN(m) ? 0 : m;
      if (mm > 59){ toast(`${cat.label}: minutos máx 59`, "warn"); return; }
      if (hh > 168 || hh < 0 || mm < 0){ toast(`${cat.label}: tempo inválido (máx 168h/sem)`, "warn"); return; }
      const decimal = hmToHours(hh, mm);
      adjusted[cat.id] = decimal;
    }
    const w = reviewScreenTimeWeek(ctx.person, ctx.ym, ctx.weekStart, 'approved', adjusted, state.user);
    if (!w) return;
    notifyKid(ctx.person, {
      kind: 'screenTime',
      title: `✅ Tempo de tela aprovado (com ajuste)`,
      body: `${formatWeekRange(ctx.weekStart)}: ${w.bonus >= 0 ? '+' : '−'}R$${Math.abs(w.bonus)}`,
      image: w.screenshot
    });
    toast(`✅ Aprovado com ajuste · ${w.bonus >= 0 ? '+' : '−'}R$${Math.abs(w.bonus)}`);
    state.ctx.reviewWeek = null;
    closeSheet();
  },

  viewScreenTimeShot(person, ym, weekStart){
    const m = Store.data.months?.[ym]?.[person];
    const w = m?.screenTimeWeeks?.find(x => x.weekStart === weekStart);
    if (!w?.screenshot){
      toast("Sem print", "warn");
      return;
    }
    const isPositive = w.bonus > 0;
    const isNegative = w.bonus < 0;
    document.getElementById('sheet').innerHTML = `
      <div class="sheet-bg" onclick="if(event.target===this)window.__app.closeSheet()">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h2>📸 Print do Tempo de Uso</h2>
          <div style="background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:14px">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
              <div style="flex:1">
                <div style="font-weight:700">${formatWeekRange(weekStart)}</div>
                <div class="ghost small">${w.by ? `lançado por ${USERS[w.by]?.name || w.by}` : ''}</div>
              </div>
              <div style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size:18px; color:${isPositive ? 'var(--credit)' : isNegative ? 'var(--debit)' : 'var(--muted)'}">
                ${isPositive ? '+' : isNegative ? '−' : ''}R$ ${Math.abs(w.bonus)}
              </div>
            </div>
            ${(w.breakdown || []).length > 0 ? `
              <div style="display:grid; grid-template-columns:repeat(${w.breakdown.length}, 1fr); gap:6px; margin-bottom:10px">
                ${w.breakdown.map(b => `
                  <div style="background:var(--card-2); border-radius:8px; padding:8px; text-align:center">
                    <div style="font-size:18px">${b.icon}</div>
                    <div style="font-weight:700; font-size:11px; margin-top:2px">${b.label}</div>
                    <div class="ghost small" style="font-size:10px">${fmtHM(b.hours)}/dia · teto ${b.maxHours}h</div>
                    <div style="font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; color:${b.value > 0 ? 'var(--credit)' : b.value < 0 ? 'var(--debit)' : 'var(--muted)'}; margin-top:4px">
                      ${b.value > 0 ? '+' : b.value < 0 ? '−' : ''}R$${Math.abs(b.value)}
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <img src="${w.screenshot}" style="width:100%; border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,0.3)">
          </div>
          <button class="btn btn-block" onclick="window.__app.closeSheet()">Fechar</button>
        </div>
      </div>`;
  },

  /* === FIREBASE SETUP === */
  openFirebaseSetup(){
    const current = (() => {
      try { return JSON.parse(localStorage.getItem("firebase_config") || "{}"); }
      catch { return {}; }
    })();
    const isActive = useFirebase && fb;
    document.getElementById('sheet').innerHTML = `
      <div class="sheet-bg" onclick="if(event.target===this)window.__app.closeSheet()">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h2>🔥 Sincronização Firebase</h2>

          <div style="background:${isActive?'rgba(48,209,88,0.10)':'rgba(255,201,64,0.08)'}; border:1px solid ${isActive?'rgba(48,209,88,0.3)':'rgba(255,201,64,0.3)'}; border-radius:14px; padding:14px; margin-bottom:14px">
            <div style="font-weight:700; font-size:14px; margin-bottom:4px">
              ${isActive ? '🟢 Sincronização ativa' : '📱 Modo local (sem sync)'}
            </div>
            <div style="font-size:12px; color:var(--muted); line-height:1.5">
              ${isActive
                ? 'Dados sincronizam em tempo real entre todos os iPhones que tiverem este arquivo configurado com as mesmas credenciais.'
                : 'Dados ficam só neste iPhone. Configure abaixo para sincronizar com outros aparelhos da família.'}
            </div>
          </div>

          <p class="ghost small" style="margin:0 0 10px; line-height:1.5">
            <b>Como obter as credenciais:</b><br>
            1. Acesse <b>console.firebase.google.com</b><br>
            2. Crie um projeto → ative <b>Realtime Database</b> e <b>Authentication anônima</b><br>
            3. Em Configurações do projeto → Geral → Apps Web → registre uma web app<br>
            4. Copie o objeto <code>firebaseConfig</code> e cole abaixo
          </p>

          <div class="field">
            <label>Configuração Firebase (cole o objeto JS completo)</label>
            <textarea id="fb-config-input" class="note-area" style="min-height:160px; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:11px; line-height:1.4"
              placeholder='{
  "apiKey": "AIzaSy...",
  "authDomain": "seu-projeto.firebaseapp.com",
  "databaseURL": "https://seu-projeto-default-rtdb.firebaseio.com",
  "projectId": "seu-projeto",
  "storageBucket": "seu-projeto.appspot.com",
  "messagingSenderId": "123456789",
  "appId": "1:123:web:abc"
}'>${current.apiKey ? JSON.stringify(current, null, 2) : ''}</textarea>
          </div>

          <p class="ghost small" style="margin:8px 0; line-height:1.5">
            ⚠️ <b>Antes de salvar</b>, configure as <b>Regras</b> do Realtime Database como:<br>
            <code style="font-size:10px; display:block; padding:6px; background:var(--card-2); border-radius:6px; margin-top:4px">{"rules":{"mesada":{".read":"auth != null",".write":"auth != null"}}}</code>
          </p>

          <div class="btn-row" style="margin-top:14px">
            <button class="btn grow" onclick="window.__app.closeSheet()">Cancelar</button>
            <button class="btn btn-primary grow" onclick="window.__app.saveFirebaseConfig()">${isActive ? '🔄 Atualizar' : '🔥 Ativar Sync'}</button>
          </div>

          ${isActive ? `
            <button class="btn btn-debit btn-block" style="margin-top:8px" onclick="window.__app.disableFirebase()">
              📱 Desativar Sync (voltar pra local)
            </button>
          ` : ''}

          ${current.apiKey ? `
            <p class="ghost small center" style="margin-top:12px">
              Projeto atual: <b>${current.projectId || '?'}</b>
            </p>
          ` : ''}
        </div>
      </div>`;
  },

  saveFirebaseConfig(){
    const txt = document.getElementById('fb-config-input')?.value?.trim();
    if (!txt){
      toast("Cole a configuração primeiro", "warn");
      return;
    }
    let parsed;
    try {
      // Aceita tanto JSON puro quanto bloco JS com chaves
      let clean = txt
        .replace(/^const\s+\w+\s*=\s*/, '')
        .replace(/;?\s*$/, '')
        .replace(/(\{|,)\s*([a-zA-Z_]\w*)\s*:/g, '$1"$2":')  // adiciona aspas em keys
        .replace(/'/g, '"');
      parsed = JSON.parse(clean);
    } catch(e){
      toast("Configuração inválida — verifique o formato", "warn");
      console.error(e);
      return;
    }
    if (!parsed.apiKey || !parsed.databaseURL){
      toast("Faltam apiKey ou databaseURL", "warn");
      return;
    }
    if (!confirm('Ativar sync? O app vai recarregar e usar os dados da nuvem (que podem sobrescrever os locais).\n\nDica: faça um Exportar primeiro pra garantir.')) return;
    try {
      localStorage.setItem("firebase_config", JSON.stringify(parsed));
      toast("✅ Configuração salva — recarregando…");
      setTimeout(() => location.reload(), 800);
    } catch(e){
      toast("Erro ao salvar: " + e.message, "warn");
    }
  },

  disableFirebase(){
    if (!confirm('Desativar sync e voltar a usar apenas este iPhone?\n\n(Os dados na nuvem permanecem intactos — você pode reativar depois.)')) return;
    try {
      localStorage.removeItem("firebase_config");
      toast("✅ Sync desativado — recarregando…");
      setTimeout(() => location.reload(), 800);
    } catch(e){
      toast("Erro: " + e.message, "warn");
    }
  },

  exportData(){
    const blob = new Blob([JSON.stringify(Store.data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `mesada-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    closeSheet();
  },
  logout(){ state.user = null; state.pinBuf = ''; closeSheet(); render(); },
  closeSheet(){ closeSheet(); }
};

/* ============================================================
   BOOT
============================================================ */
Store.onChange(() => { detectNewItems(); render(); });
Store.init();
render();
startUpdateChecker();
</script>

<!--
================================================================
  REGRAS DE PONTUAÇÃO

  📚 DISCIPLINAS A: ≥10→+100 · ≥9→+40 · ≥8→+20 · ≥7→+10 · 6–6,99→0 · <6→−50
  📖 DISCIPLINAS B: ≥10→+20  · ≥9→+15 · ≥8→+10 · ≥7→+5  · 6–6,99→0 · <6→−50
  ⚠️ Ocorrências: −R$20 cada
  🏠 Tarefas: walk/food/kitchen/dishes/poop R$5 · grass R$50 · pool R$10 · meal R$30
  🎁 Bônus: livro +R$100 · poupar +R$100 · doação +R$50
  💰 Teto mensal R$700, mês negativo é zerado.
  📅 Avaliações: APA, AT1 e AT2 disponíveis o ano todo.

================================================================
  COMPROVAÇÃO POR FOTO

  • Meninos (JP / Lucas) → ao registrar nota, ocorrência, tarefa ou bônus,
    o app pede foto via câmera ou biblioteca ANTES de salvar.
    Sem foto = ação cancelada.
  • Pais → registram livremente; o botão 📷 ao lado de cada item
    permite adicionar/trocar/apagar foto a qualquer momento.
  • Fotos comprimidas para ~50KB cada (1024px máx, JPEG 60%).
  • Botão 📷 verde + bolinha = tem foto. Cinza = sem foto.
  • Toque o botão pra ver, trocar ou apagar a foto.
  • Para tarefas e ocorrências (que têm contador), cada incremento
    cria uma foto na galeria. Tap na 📷 mostra o álbum daquela tarefa.

================================================================
  COMO ATIVAR SINCRONIZAÇÃO ENTRE OS IPHONES (Firebase grátis)

  1. https://console.firebase.google.com → Criar projeto
  2. Realtime Database → Criar (modo de teste)
  3. ⚙️ Configurações → Adicionar app web (</> )
  4. Copie o objeto firebaseConfig
  5. Cole no topo deste arquivo, dentro de window.FIREBASE_CONFIG
     (descomente as linhas e use seus valores reais)
  6. Salve, recarregue. Vai aparecer "sync ativa".

  Regras do Firebase (depois dos 30 dias):
     {"rules": {".read": true, ".write": true}}

================================================================
  COMO INSTALAR NO IPHONE

  • Hospede em URL HTTPS (Netlify Drop é o jeito mais rápido — só arrastar)
  • No iPhone, abra no SAFARI
  • Compartilhar → "Adicionar à Tela de Início"
  • Pronto: ícone 💸 com tela cheia

  PINs padrão: Pai 1234 · Mãe 5678 · JP 1111 · Lucas 2222

================================================================
